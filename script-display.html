<script>
  /**
   * @module script-display
   * @description 閃卡顯示與互動模組：暫停/恢復計時器、單字點擊（暫時刪除）、
   *   翻譯顯示與排程、D 鍵雙按確認標記非常熟、通知、圖片預加載。
   *   設定 modal → script-settings-modal.html
   *   不熟程度 → script-difficulty.html
   *   進度條 → script-progress-bar.html
   *
   * @dependencies script-core.html, script-settings-modal.html,
   *   script-difficulty.html, script-progress-bar.html
   * @provides FlashcardApp.prototype: pauseTimer, resumeTimer,
   *   onWordClick, confirmRemoval, cancelRemoval, undoLastConfirmedRemoval,
   *   isRemovalUndoEligible, _clearRemovalUndoHalfExpireTimer, _revealSecondPart,
   *   showSecondPartAndScheduleNext, handleMarkVeryFamiliar, showNotification,
   *   preloadImage, preloadUpcomingImages ...
   */

  // 暫停計時器
  FlashcardApp.prototype.pauseTimer = function() {
    this.isPaused = true;
    
    // 在清除計時器前，計算剩餘時間（用於恢復時精確還原進度）
    if (this._activeTimerInfo) {
      var elapsed = Date.now() - this._activeTimerInfo.setAt;
      this._pauseRemainingMs = Math.max(0, this._activeTimerInfo.delay - elapsed);
    } else {
      this._pauseRemainingMs = 0;
    }
    
    this._clearDisplayTimer();
    
    // 清理語音等待計時器
    this.clearSpeechWait();
    
    // 暫停進度條
    this.pauseProgressBar();

  };
  
  // 恢復計時器
  FlashcardApp.prototype.resumeTimer = function() {
    // 只有在用戶沒有手動暫停的情況下才恢復計時器
    if (!this.userPaused) {
      this.isPaused = false;
    }
    
    var self = this;
    if (!this.isPaused) {
      // 使用暫停時記錄的剩餘時間，確保計時器與進度條精確同步
      var remainingMs = this._pauseRemainingMs;
      
      if (this.showingChinese) {
        if (!remainingMs || remainingMs <= 0) {
          remainingMs = this.getPhase2Delay() * 1000;
        }
        this._setDisplayTimer(function() {
          self.waitForSpeechThenExecute(function() {
            self.nextWord();
          });
        }, remainingMs);
        // 恢復進度條（輪播模式保留原 phase，否則為第二階段）
        if (this._progressPhase !== 'carousel') {
          this._progressPhase = 2;
        }
        this.resumeProgressBar(remainingMs / 1000);
      } else if (!this.isTransitioning && !this.isProcessingClick) {
        var currentWord = this.currentWords[this.currentIndex];
        if (currentWord) {
          if (!remainingMs || remainingMs <= 0) {
            remainingMs = this.settings.delayTime * 1000;
          }
          this._setDisplayTimer(function() {
            self.waitForSpeechThenExecute(function() {
              self.showSecondPartAndScheduleNext();
            });
          }, remainingMs);
          // 恢復進度條（第一階段：使用剩餘時間）
          this._progressPhase = 1;
          this.resumeProgressBar(remainingMs / 1000);
        }
      }
      
      this._pauseRemainingMs = 0;
    }
    
    // 更新UI狀態
    this.updatePauseButtonState();
  };

  // 處理flashcard點擊事件（檢查點擊位置）
  FlashcardApp.prototype.handleFlashcardClick = function(event) {
    // 檢查點擊是否發生在控制按鈕或選單上（ES5兼容版本）
    var target = event.target;
    
    // 向上遍历DOM树检查是否点击了控制元素
    var element = target;
    while (element && element !== event.currentTarget) {
      if (element.classList && (
          element.classList.contains('controls-wrapper') ||
          element.classList.contains('progress') ||
          element.classList.contains('restore-btn-container') ||
          element.classList.contains('paused-indicator') ||
          element.classList.contains('paused-content') ||
          element.classList.contains('paused-icon') ||
          element.classList.contains('paused-text') ||
          element.classList.contains('muted-indicator') ||
          element.classList.contains('muted-content') ||
          element.classList.contains('muted-icon') ||
          element.classList.contains('muted-text') ||
          element.classList.contains('active-filters') ||
          element.classList.contains('quick-timer-dock') ||
          element.tagName === 'BUTTON')) {
        return; // 如果點擊的是控制元素，不處理
      }
      element = element.parentElement;
    }
    
    // 計算下方安全區域的高度
    var flashcardRect = event.currentTarget.getBoundingClientRect();
    var clickY = event.clientY;
    var flashcardBottom = flashcardRect.bottom;
    
    // 動態計算下方安全區域高度
    var progressElement = document.getElementById('progress-area');
    var controlsWrapper = document.querySelector('.controls-wrapper');
    var safeAreaHeight = APP_CONSTANTS.SAFE_AREA_DEFAULT_HEIGHT_PX; // 默認高度
    
    // 嘗試動態計算實際高度
    try {
      var progressHeight = progressElement ? progressElement.offsetHeight + 20 : 40; // 包含padding
      var controlsHeight = controlsWrapper ? controlsWrapper.offsetHeight + 20 : 60; // 包含padding
      safeAreaHeight = Math.max(progressHeight, controlsHeight) + 20; // 額外的安全邊距
    } catch (e) {
      console.log('無法動態計算安全區域高度，使用默認值');
    }
    
    var safeAreaTop = flashcardBottom - safeAreaHeight;
    
    // 如果點擊位置在下方安全區域內，不觸發刪除功能
    if (clickY >= safeAreaTop) {
      console.log('點擊位置在安全區域內(Y:' + clickY + ', 安全區域起始:' + safeAreaTop + ')，不觸發刪除功能');
      return;
    }
    
    console.log('點擊位置在有效區域內(Y:' + clickY + ', 安全區域起始:' + safeAreaTop + ')，觸發刪除功能');
    // 觸發單字點擊事件
    this.onWordClick();
  };
  
  // 單字點擊事件（刪除單字功能）
  FlashcardApp.prototype.onWordClick = function() {
    if (this.isTransitioning || this.isPaused) return;
    
    if (this.currentWords.length <= 1) {
      var sections = document.querySelectorAll('.card-section');
      for (var i = 0; i < sections.length; i++) {
        sections[i].style.backgroundColor = 'rgba(255, 100, 100, 0.3)';
        (function(section) {
          setTimeout(function() {
            section.style.backgroundColor = '';
          }, APP_CONSTANTS.TRANSITION_DELAY_MS);
        })(sections[i]);
      }
      return;
    }
    
    var currentWord = this.currentWords[this.currentIndex];
    var englishElement = document.getElementById('english-word');
    var chineseElement = document.getElementById('chinese-word');
    
    var isAlreadyMarked = englishElement.classList.contains('word-pending-removal');
    
    if (isAlreadyMarked) {
      this.nextWord();
        return;
      }
      
    this.isProcessingClick = true;
    
    this._clearDisplayTimer();
    
    if (!this.showingChinese) {
      // 聽力模式：點擊時同時顯示第一語言
      if (this.settings.listeningMode) {
        var isReversed = this.isReversedForCurrentWord();
        englishElement.textContent = isReversed ? currentWord.chinese : currentWord.english;
      }
      this._revealSecondPart(currentWord);
    }
    
    englishElement.classList.add('word-pending-removal');
    chineseElement.classList.add('word-pending-removal');
    
    var sections = document.querySelectorAll('.card-section');
    for (var i = 0; i < sections.length; i++) {
      sections[i].classList.add('clicked');
      (function(section) {
        setTimeout(function() { 
          section.classList.remove('clicked'); 
        }, 500);
      })(sections[i]);
    }
    
    // 記錄原始不熟程度，以便取消時恢復
    var originalDifficultyLevel = (currentWord.difficultyLevel !== undefined && currentWord.difficultyLevel !== null) ? currentWord.difficultyLevel : 0;
    // 最後複習時間是今天時不減少不熟程度，避免同一天加強複習造成過度下降
    var alreadyReviewedToday = currentWord.lastReviewDate === this.getTodayDateString();
    var previewLevel = alreadyReviewedToday ? originalDifficultyLevel : Math.max(APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR, originalDifficultyLevel - 1);

    this.pendingRemoval = {
      word: currentWord,
      index: this.currentIndex,
      originalEnglishColor: englishElement.style.color,
      originalChineseColor: chineseElement.style.color,
      originalDifficultyLevel: originalDifficultyLevel
    };
    
    // 立即在 UI 上顯示減少後的不熟程度（提升 UX）
    this.renderDifficultyLevelPreview(previewLevel);
    
    this.showRestoreButton();
    this.updateButtonStates();
    
    var self = this;
    var phase2Delay = this.getPhase2Delay();
    this._setDisplayTimer(function() {
      self.waitForSpeechThenExecute(function() {
        self.confirmRemoval();
      });
    }, phase2Delay * 1000);
    
    // 進度條第二階段：50% → 100%（翻譯已顯示，等待移除確認，使用智慧延遲）
    this.startProgressBar(2, phase2Delay);
  };
  
  /**
   * 確認移除當前 pendingRemoval 的單字。
   * 若 isVeryFamiliar 為 true，設定 difficultyLevel = DIFFICULTY_VERY_FAMILIAR 並同步後端；
   * 否則從 currentWords 中移除該字。移除後自動顯示下一張卡片。
   */
  FlashcardApp.prototype.confirmRemoval = function() {
    if (!this.pendingRemoval) return;
    
    var word = this.pendingRemoval.word;
    var index = this.pendingRemoval.index;
    var isVeryFamiliar = this.pendingRemoval.isVeryFamiliar;
    var origLevel = (this.pendingRemoval.originalDifficultyLevel !== undefined && this.pendingRemoval.originalDifficultyLevel !== null)
      ? this.pendingRemoval.originalDifficultyLevel : 0;

    var reviewKey = word.sheetName + ':' + word.originalRowIndex;
    var prevHadReviewKey = Object.prototype.hasOwnProperty.call(this.reviewedInSession, reviewKey);
    var prevReviewedValue = this.reviewedInSession[reviewKey];
    var prevLastReviewDate = word.lastReviewDate;

    var srsKey = word.sheetName + ':' + word.originalRowIndex;
    var rawSrs = this.srsData[srsKey];
    var prevSrsEntry = rawSrs ? JSON.parse(JSON.stringify(rawSrs)) : null;

    var orderedWordIds = this.currentWords.map(function(w) { return w.id; });

    this.removalUndoEntry = {
      orderedWordIds: orderedWordIds,
      removalIndex: index,
      wordId: word.id,
      isVeryFamiliar: !!isVeryFamiliar,
      originalDifficultyLevel: origLevel,
      prevLastReviewDate: prevLastReviewDate,
      reviewKey: reviewKey,
      prevHadReviewKey: prevHadReviewKey,
      prevReviewedValue: prevReviewedValue,
      srsKey: srsKey,
      prevSrsEntry: prevSrsEntry
    };
    
    if (isVeryFamiliar) {
      word.difficultyLevel = APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR;
      
      // 同步到 words 主陣列
      var mainWord = this.words.find(function(w) { return w.id === word.id; });
      if (mainWord) mainWord.difficultyLevel = APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR;
      
      // 後端同步
      this.syncDifficultyToBackend(word);
      
      // 更新 SRS 資料
      this.updateSrsData(word);
      
      console.log('已設為非常熟:', word.english);
    } else {
      // 最後複習時間是今天時不減少不熟程度，避免同一天加強複習造成過度下降
      var alreadyReviewedToday = word.lastReviewDate === this.getTodayDateString();
      if (!alreadyReviewedToday) {
        this.decreaseDifficulty(word);
      }
    }
    
    // 標記該單字為已複習（暫時刪除才算已複習）
    this.markWordAsReviewed(word);
    
    this.removedWords.push(word);
    this.currentWords.splice(index, 1);
    
    if (this.currentIndex >= this.currentWords.length) {
      this.currentIndex = 0;
      // 移除最後一個單字導致回到開頭時，重新打亂順序
      if (this.currentWords.length > 1) {
        this.shuffleArray(this.currentWords);
      }
    }
    
    this.pendingRemoval = null;
    this.hideRestoreButton();
    
    // 剩餘單字很少時提前同步複習日期，避免使用者暫停後未觸發閾值而遺漏
    if (this.currentWords.length <= APP_CONSTANTS.REVIEW_SYNC_LOW_WORDS_TRIGGER) {
      this.syncReviewDates();
    }

    if (this.currentWords.length === 0) {
      this.startNewRound();
    } else {
      this.displayCurrentWord();
    }
    
    this.isProcessingClick = false;
    this.updateButtonStates();
  };
  
  /**
   * 取消移除：恢復原本不熟程度並重新顯示卡片內容，清除 pendingRemoval 狀態。
   */
  FlashcardApp.prototype.cancelRemoval = function() {
    if (!this.pendingRemoval) return;
    
    var isVeryFamiliar = this.pendingRemoval.isVeryFamiliar;
    
    var englishElement = document.getElementById('english-word');
    var chineseElement = document.getElementById('chinese-word');
    
    englishElement.classList.remove('word-pending-removal');
    chineseElement.classList.remove('word-pending-removal');
    
    // 恢復原本的不熟程度顯示
    if (this.pendingRemoval.originalDifficultyLevel !== undefined) {
      this.renderDifficultyLevelPreview(this.pendingRemoval.originalDifficultyLevel);
    }
    
    // 如果是取消非常熟標記，隱藏 toast
    if (isVeryFamiliar) {
      this.hideVeryFamiliarToast();
    }
    
    this.pendingRemoval = null;
    this.hideRestoreButton();
    
    this._clearDisplayTimer();
    
    this.isProcessingClick = false;
    this.updateButtonStates();
    
    var self = this;
    if (this.showingChinese) {
      var phase2Delay = this.getPhase2Delay();
      this._setDisplayTimer(function() {
        self.waitForSpeechThenExecute(function() {
          self.nextWord();
        });
      }, phase2Delay * 1000);
      // 進度條第二階段：50% → 100%（使用智慧延遲）
      this.startProgressBar(2, phase2Delay);
      } else {
      this._setDisplayTimer(function() {
        self.waitForSpeechThenExecute(function() {
          self.showSecondPartAndScheduleNext();
        });
      }, this.settings.delayTime * 1000);
      // 進度條第一階段：0% → 50%
      this.startProgressBar(1);
    }
  };
  
  // 顯示恢復按鈕
  FlashcardApp.prototype.showRestoreButton = function() {
    var restoreBtnContainer = document.getElementById('restore-btn-container');
    if (restoreBtnContainer) {
      restoreBtnContainer.style.display = 'block';
    }
    var progressArea = document.getElementById('progress-area');
    if (progressArea) {
      progressArea.classList.add('progress-shifted');
    }
  };
  
  // 隱藏恢復按鈕
  FlashcardApp.prototype.hideRestoreButton = function() {
    var restoreBtnContainer = document.getElementById('restore-btn-container');
    if (restoreBtnContainer) {
      restoreBtnContainer.style.display = 'none';
    }
    var progressArea = document.getElementById('progress-area');
    if (progressArea) {
      progressArea.classList.remove('progress-shifted');
    }
  };
  
  /**
   * 共用：顯示第二語言文字、背景圖片、並派送語音。
   * 被 showSecondPartAndScheduleNext / onWordClick / confirmMarkVeryFamiliar 共同使用。
   * @param {Object} currentWord - 當前單字物件
   */
  FlashcardApp.prototype._revealSecondPart = function(currentWord) {
    var chineseElement = document.getElementById('chinese-word');
    var flashcardDiv = document.getElementById('flashcard');
    var isReversed = this.isReversedForCurrentWord();
    var secondText = isReversed ? currentWord.english : currentWord.chinese;

    chineseElement.textContent = secondText;
    chineseElement.classList.add('show');
    this.showingChinese = true;

    var hasImage = currentWord.image && currentWord.image !== '';
    if (hasImage) {
      this.setFlashcardImage(currentWord.image);
    } else {
      this.clearFlashcardImage();
    }

    var self = this;
    if (this.settings.listeningMode) {
      // 聽力模式：Phase 2 出現文字時再次發音，強化聽覺記憶（忽略延遲發音設定）
      setTimeout(function() { self.speakWord(currentWord.english); }, APP_CONSTANTS.SPEECH_DELAY_MS);
    } else {
      if (isReversed) {
        setTimeout(function() { self.speakWord(currentWord.english); }, APP_CONSTANTS.SPEECH_DELAY_MS);
      } else {
        setTimeout(function() { self.speakChineseWord(currentWord.chinese); }, APP_CONSTANTS.SPEECH_DELAY_MS);
        if (this.settings.delaySpeechInNormalMode) {
          setTimeout(function() { self.speakWord(currentWord.english); }, APP_CONSTANTS.SPEECH_DELAY_MS);
        }
      }
    }

    // 非輪播：第二語言已顯示＝進度已過一半，單次「暫刪還原」機會失效
    if (this.removalUndoEntry && !this.settings.carouselMemoryMode) {
      this.removalUndoEntry = null;
      this._clearRemovalUndoHalfExpireTimer();
      this.updateButtonStates();
    }
  };

  /**
   * 顯示第二部分（翻譯/原文）並安排自動切換到下一張卡片。
   * Phase 2 延遲由 getPhase2Delay() 決定。
   */
  FlashcardApp.prototype.showSecondPartAndScheduleNext = function() {
    if (this.isPaused || this.showingChinese || !this.currentWords[this.currentIndex]) {
      return;
    }
  
    this._clearDisplayTimer();
    
    if (this.chineseDelayTimer) {
      clearTimeout(this.chineseDelayTimer);
      this.chineseDelayTimer = null;
    }

    var currentWord = this.currentWords[this.currentIndex];

    // 聽力模式：Phase 2 時同時顯示第一語言文字
    if (this.settings.listeningMode) {
      var firstElement = document.getElementById('english-word');
      var isReversed = this.isReversedForCurrentWord();
      firstElement.textContent = isReversed ? currentWord.chinese : currentWord.english;
    }

    this._revealSecondPart(currentWord);
    
    var self = this;
    var phase2Delay = this.getPhase2Delay();
    this._setDisplayTimer(function() {
      self.waitForSpeechThenExecute(function() {
        self.nextWord();
      });
    }, phase2Delay * 1000);
    
    this.startProgressBar(2, phase2Delay);
  };
  
  // 預加載圖片方法
  FlashcardApp.prototype.preloadImage = function(imageUrl, callback) {
    if (!imageUrl || imageUrl === '') {
      if (callback) callback(false);
      return;
    }
    
    // 如果已經預加載過，直接回調
    if (this.preloadedImages[imageUrl]) {
      if (callback) callback(true);
      return;
    }
    
    var self = this;
    var img = new Image();
    
    img.onload = function() {
      self.preloadedImages[imageUrl] = true;
      if (callback) callback(true);
    };
    
    img.onerror = function() {
      console.warn('圖片預加載失敗:', imageUrl);
      if (callback) callback(false);
    };
    
    img.src = imageUrl;
    this.currentPreloadingImage = img;
  };

  /**
   * 批次預載即將輪到的單字圖片（預設 10 張），減少快速切換時的等待。
   */
  FlashcardApp.prototype.preloadUpcomingImages = function(count) {
    if (!this.currentWords || this.currentWords.length === 0) return;
    var total = this.currentWords.length;
    var n = count || 10;
    for (var i = 0; i < n && i < total; i++) {
      var idx = (this.currentIndex + i) % total;
      var w = this.currentWords[idx];
      if (w && w.image && w.image !== '') {
        this.preloadImage(w.image);
      }
    }
  };
  
  // ===========================================
  // D 鍵：標記為非常熟功能
  // ===========================================

  FlashcardApp.prototype.handleMarkVeryFamiliar = function() {
    if (this.currentWords.length === 0) return;
    
    var currentWord = this.currentWords[this.currentIndex];
    if (!currentWord) return;
    
    if (currentWord.difficultyLevel <= APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR) {
      this.showVeryFamiliarToast('此字已經是非常熟');
      return;
    }
    
    // 如果已經在非常熟暫時刪除狀態中，忽略
    if (this.pendingRemoval && this.pendingRemoval.isVeryFamiliar) {
      return;
    }
    
    // 如果已有待確認狀態（第二次按 D）
    if (this._pendingVeryFamiliar && this._pendingVeryFamiliar.wordId === currentWord.id) {
      // 確認標記為非常熟（進入暫時刪除狀態）
      this.confirmMarkVeryFamiliar();
      return;
    }
    
    // 第一次按 D：暫停計時器並顯示確認提示
    var savedRemainingMs = 0;
    var savedProgressPhase = this._progressPhase;
    if (this._activeTimerInfo) {
      var elapsed = Date.now() - this._activeTimerInfo.setAt;
      savedRemainingMs = Math.max(0, this._activeTimerInfo.delay - elapsed);
    }
    this._clearDisplayTimer();
    this.pauseProgressBar();
    
    // 儲存計時器狀態，供取消或特殊路徑恢復使用
    this._vfSavedTimer = {
      remainingMs: savedRemainingMs,
      progressPhase: savedProgressPhase
    };
    
    var self = this;
    this._pendingVeryFamiliar = {
      wordId: currentWord.id,
      timer: setTimeout(function() {
        self.cancelMarkVeryFamiliar();
      }, APP_CONSTANTS.VERY_FAMILIAR_TIMEOUT_MS)
    };
    
    this.showVeryFamiliarToast('再按一下 D 設為非常熟');
  };

  /**
   * 確認標記為非常熟（difficultyLevel = DIFFICULTY_VERY_FAMILIAR）。
   * 進入 pendingRemoval 暫時刪除狀態，以灰色字顯示答案供確認。
   * 若目前已在 difficultyFilter < 0 模式下，則直接設定而不進入 pending 狀態。
   */
  FlashcardApp.prototype.confirmMarkVeryFamiliar = function() {
    if (!this._pendingVeryFamiliar) return;
    
    var wordId = this._pendingVeryFamiliar.wordId;
    
    // 清除待確認狀態
    if (this._pendingVeryFamiliar.timer) {
      clearTimeout(this._pendingVeryFamiliar.timer);
    }
    this._pendingVeryFamiliar = null;
    
    // 找到目標單字
    var currentWord = this.currentWords[this.currentIndex];
    if (!currentWord || currentWord.id !== wordId) return;
    
    // 如果在負數篩選模式下，直接設定並更新顯示（不需要移除）
    if (this.difficultyFilter < 0) {
      currentWord.difficultyLevel = APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR;
      var mainWord = this.words.find(function(w) { return w.id === wordId; });
      if (mainWord) mainWord.difficultyLevel = APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR;
      this.syncDifficultyToBackend(currentWord);
      this.updateSrsData(currentWord);
      this.showVeryFamiliarToast('✓ 已設為非常熟');
      this.renderDifficultyLevel();
      // 恢復被第一次 D 暫停的計時器
      this._resumeTimerAfterVeryFamiliarCancel();
      return;
    }
    
    // 如果已經有 pendingRemoval（例如已經點擊過單字卡），升級為非常熟
    if (this.pendingRemoval && this.pendingRemoval.word && this.pendingRemoval.word.id === wordId) {
      this.pendingRemoval.isVeryFamiliar = true;
      this.renderDifficultyLevelPreview(APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR);
      this.showVeryFamiliarToast('✓ 已設為非常熟');
      this._resumeTimerAfterVeryFamiliarCancel();
      return;
    }
    
    // === 進入類似暫時刪除的狀態 ===
    
    // 清除 D 鍵暫停時儲存的計時器狀態（不再需要，將使用新的計時器）
    this._vfSavedTimer = null;
    
    var englishElement = document.getElementById('english-word');
    var chineseElement = document.getElementById('chinese-word');
    
    this.isProcessingClick = true;
    this._clearDisplayTimer();
    
    if (!this.showingChinese) {
      if (this.settings.listeningMode) {
        var isReversed = this.isReversedForCurrentWord();
        englishElement.textContent = isReversed ? currentWord.chinese : currentWord.english;
      }
      this._revealSecondPart(currentWord);
    }
    
    // 灰色字顯示（pending removal 視覺效果）
    englishElement.classList.add('word-pending-removal');
    chineseElement.classList.add('word-pending-removal');
    
    // 記錄原始不熟程度，以便取消時恢復
    var originalDifficultyLevel = (currentWord.difficultyLevel !== undefined && currentWord.difficultyLevel !== null) ? currentWord.difficultyLevel : 0;
    
    // 建立 pendingRemoval 狀態（標記為 isVeryFamiliar）
    this.pendingRemoval = {
      word: currentWord,
      index: this.currentIndex,
      originalEnglishColor: englishElement.style.color,
      originalChineseColor: chineseElement.style.color,
      originalDifficultyLevel: originalDifficultyLevel,
      isVeryFamiliar: true
    };
    
    this.renderDifficultyLevelPreview(APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR);
    
    this.showRestoreButton();
    this.updateButtonStates();
    
    // 顯示確認訊息
    this.showVeryFamiliarToast('✓ 已設為非常熟');
    
    // 設定計時器，到期後透過 confirmRemoval 確認
    var self = this;
    var phase2Delay = this.getPhase2Delay();
    this._setDisplayTimer(function() {
      self.waitForSpeechThenExecute(function() {
        self.confirmRemoval();
      });
    }, phase2Delay * 1000);
    
    // 進度條第二階段
    this.startProgressBar(2, phase2Delay);
  };

  // 恢復被第一次 D 鍵暫停的計時器（共用邏輯）
  FlashcardApp.prototype._resumeTimerAfterVeryFamiliarCancel = function() {
    if (!this._vfSavedTimer) return;
    
    var savedRemainingMs = this._vfSavedTimer.remainingMs;
    var savedProgressPhase = this._vfSavedTimer.progressPhase;
    this._vfSavedTimer = null;
    
    // 恢復計時器和進度條（如果不在暫停狀態）
    if (!this.isPaused && savedRemainingMs > 0) {
      var self = this;
      if (savedProgressPhase === 2 || this.showingChinese) {
        this._setDisplayTimer(function() {
          self.waitForSpeechThenExecute(function() {
            self.nextWord();
          });
        }, savedRemainingMs);
        this._progressPhase = 2;
        this.resumeProgressBar(savedRemainingMs / 1000);
      } else {
        this._setDisplayTimer(function() {
          self.waitForSpeechThenExecute(function() {
            self.showSecondPartAndScheduleNext();
          });
        }, savedRemainingMs);
        this._progressPhase = 1;
        this.resumeProgressBar(savedRemainingMs / 1000);
      }
    }
  };

  // 取消標記為非常熟（恢復計時器）
  FlashcardApp.prototype.cancelMarkVeryFamiliar = function() {
    if (!this._pendingVeryFamiliar) return;
    
    if (this._pendingVeryFamiliar.timer) {
      clearTimeout(this._pendingVeryFamiliar.timer);
    }
    this._pendingVeryFamiliar = null;
    this.hideVeryFamiliarToast();
    
    // 恢復被第一次 D 暫停的計時器
    this._resumeTimerAfterVeryFamiliarCancel();
  };

  // 顯示非常熟提示訊息（toast）
  FlashcardApp.prototype.showVeryFamiliarToast = function(message) {
    var toast = document.getElementById('very-familiar-toast');
    if (!toast) return;
    
    toast.textContent = message;
    toast.style.display = 'block';
    toast.style.opacity = '1';
    
    // 如果是確認訊息，1.5 秒後自動隱藏
    if (message.indexOf('✓') === 0 || message.indexOf('此字已經') === 0) {
      var self = this;
      setTimeout(function() {
        self.hideVeryFamiliarToast();
      }, APP_CONSTANTS.TOAST_CONFIRM_DURATION_MS);
    }
  };

  // 隱藏非常熟提示訊息
  FlashcardApp.prototype.hideVeryFamiliarToast = function() {
    var toast = document.getElementById('very-familiar-toast');
    if (!toast) return;
    toast.style.opacity = '0';
    setTimeout(function() {
      toast.style.display = 'none';
    }, APP_CONSTANTS.NOTIFICATION_FADE_MS);
  };

  // 通用通知 toast
  FlashcardApp.prototype.showNotification = function(message, type) {
    var existing = document.getElementById('app-notification-toast');
    if (existing && existing.parentNode) {
      existing.parentNode.removeChild(existing);
    }
    if (this._notificationTimer) {
      clearTimeout(this._notificationTimer);
      this._notificationTimer = null;
    }

    var toast = document.createElement('div');
    toast.id = 'app-notification-toast';
    toast.className = 'app-notification-toast' + (type === 'success' ? ' toast-success' : type === 'info' ? ' toast-info' : '');

    var lines = message.split('\n');
    if (lines.length > 1) {
      var title = document.createElement('div');
      title.className = 'toast-title';
      title.textContent = lines[0];
      toast.appendChild(title);
      var list = document.createElement('div');
      list.className = 'toast-details';
      for (var i = 1; i < lines.length; i++) {
        var row = document.createElement('div');
        row.className = 'toast-detail-row';
        row.textContent = lines[i];
        list.appendChild(row);
      }
      toast.appendChild(list);
    } else {
      toast.style.whiteSpace = 'pre-line';
      toast.textContent = message;
    }

    document.body.appendChild(toast);

    setTimeout(function() { toast.classList.add('show'); }, 10);

    var self = this;
    var scheduleHide = function() {
      self._notificationTimer = setTimeout(function() {
        toast.classList.remove('show');
        setTimeout(function() {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 300);
      }, 3000);
    };

    toast.addEventListener('mouseenter', function() {
      if (self._notificationTimer) {
        clearTimeout(self._notificationTimer);
        self._notificationTimer = null;
      }
    });
    toast.addEventListener('mouseleave', function() {
      scheduleHide();
    });

    scheduleHide();
  };

  // ===========================================
  // 導覽與暫停控制（從 script-voice.html 搬移）
  // ===========================================

  /**
   * 清除輪播模式下「進度過半」暫刪還原計時器。
   */
  FlashcardApp.prototype._clearRemovalUndoHalfExpireTimer = function() {
    if (this._removalUndoHalfExpireTimer) {
      clearTimeout(this._removalUndoHalfExpireTimer);
      this._removalUndoHalfExpireTimer = null;
    }
  };

  /**
   * 是否可觸發單次「確認暫刪後還原」：有快照、進度未過一半（翻譯尚未顯示／輪播條未過 50%）。
   */
  FlashcardApp.prototype.isRemovalUndoEligible = function() {
    if (!this.removalUndoEntry) return false;
    if (this.settings.carouselMemoryMode) {
      var bar = document.getElementById('timer-progress-bar');
      if (!bar || !bar.parentElement) return false;
      var parentWidth = bar.parentElement.offsetWidth;
      if (parentWidth <= 0) return true;
      var w = 0;
      try {
        w = parseFloat(window.getComputedStyle(bar).width) || 0;
      } catch (e) {
        w = bar.offsetWidth || 0;
      }
      return (w / parentWidth) * 100 < 50;
    }
    return !this.showingChinese;
  };

  /**
   * 還原上一筆已確認的暫時刪除（↑／←／「上一個」；單次、須符合 isRemovalUndoEligible）。
   */
  FlashcardApp.prototype.undoLastConfirmedRemoval = function() {
    if (!this.removalUndoEntry || !this.isRemovalUndoEligible()) return;

    var entry = this.removalUndoEntry;
    this.removalUndoEntry = null;
    this._clearRemovalUndoHalfExpireTimer();

    var word = this.words.find(function(w) { return w.id === entry.wordId; });
    if (!word) return;

    this.resetProgressBar();
    this.clearAllTimersAndSpeech();

    this.isTransitioning = true;

    var englishElement = document.getElementById('english-word');
    var chineseElement = document.getElementById('chinese-word');

    englishElement.classList.remove('show');
    chineseElement.classList.remove('show');
    englishElement.classList.remove('word-pending-removal');
    chineseElement.classList.remove('word-pending-removal');

    chineseElement.textContent = '';
    this.clearFlashcardImage();

    var self = this;
    setTimeout(function() {
      var origLevel = entry.originalDifficultyLevel;
      word.difficultyLevel = origLevel;
      var mainWord = self.words.find(function(w) { return w.id === entry.wordId; });
      if (mainWord) mainWord.difficultyLevel = origLevel;
      self.syncDifficultyToBackend(word);

      word.lastReviewDate = entry.prevLastReviewDate;
      if (!entry.prevHadReviewKey) {
        delete self.reviewedInSession[entry.reviewKey];
      } else {
        self.reviewedInSession[entry.reviewKey] = entry.prevReviewedValue;
      }

      if (entry.prevSrsEntry === null) {
        delete self.srsData[entry.srsKey];
      } else {
        self.srsData[entry.srsKey] = JSON.parse(JSON.stringify(entry.prevSrsEntry));
      }
      self.saveSrsData();

      if (self.removedWords.length > 0 && self.removedWords[self.removedWords.length - 1].id === entry.wordId) {
        self.removedWords.pop();
      }

      var restored = [];
      for (var i = 0; i < entry.orderedWordIds.length; i++) {
        var wid = entry.orderedWordIds[i];
        var w = self.words.find(function(ww) { return ww.id === wid; });
        if (w) restored.push(w);
      }
      self.currentWords = restored;
      self.currentIndex = entry.removalIndex;

      self.displayCurrentWord();
      self.isTransitioning = false;
    }, APP_CONSTANTS.TRANSITION_DELAY_MS);
    this.renderDifficultyLevel();
  };

  FlashcardApp.prototype.nextWord = function() {
    if (this.isTransitioning || this.isPaused) return;
    
    if (this.pendingRemoval) {
      this.confirmRemoval();
        return;
      }
      
    if (!this.showingChinese) {
      this.showSecondPartAndScheduleNext();
        return;
      }

    this._clearRemovalUndoHalfExpireTimer();
    this.removalUndoEntry = null;
      
    this.saveNavigationState();
    
    this.resetProgressBar();
    this.clearAllTimersAndSpeech();
    
    this.isTransitioning = true;
    
    var englishElement = document.getElementById('english-word');
    var chineseElement = document.getElementById('chinese-word');
    
    englishElement.classList.remove('show');
    chineseElement.classList.remove('show');
    englishElement.classList.remove('word-pending-removal');
    chineseElement.classList.remove('word-pending-removal');
    
    chineseElement.textContent = '';
    this.clearFlashcardImage();
    
    var self = this;
    setTimeout(function() {
      self.currentIndex = (self.currentIndex + 1) % self.currentWords.length;
      
      if (self.currentIndex === 0) {
        self.shuffleArray(self.currentWords);
        self.navigationHistory = [];
      }
      
      self.displayCurrentWord();
      self.isTransitioning = false;
      
    }, APP_CONSTANTS.TRANSITION_DELAY_MS);
    this.renderDifficultyLevel();
  };

  FlashcardApp.prototype.previousWord = function() {
    if (this.isTransitioning || this.isPaused) return;
    
    if (this.pendingRemoval) {
      this.cancelRemoval();
      return;
    }

    if (this.removalUndoEntry && this.isRemovalUndoEligible()) {
      this.undoLastConfirmedRemoval();
      return;
    }
    
    if (this.navigationHistory.length === 0) return;
    
    this.resetProgressBar();
    this.clearAllTimersAndSpeech();
    
    this.isTransitioning = true;
    
    var englishElement = document.getElementById('english-word');
    var chineseElement = document.getElementById('chinese-word');
    
    englishElement.classList.remove('show');
    chineseElement.classList.remove('show');
    englishElement.classList.remove('word-pending-removal');
    chineseElement.classList.remove('word-pending-removal');
    
    chineseElement.textContent = '';
    this.clearFlashcardImage();
    
    var self = this;
    setTimeout(function() {
      var previousState = self.navigationHistory.pop();
      
      var previousWord = previousState.wordSequence[previousState.currentIndex];
      
      var wordIndex = -1;
      for (var i = 0; i < self.currentWords.length; i++) {
        if (self.currentWords[i].english === previousWord.english && 
            self.currentWords[i].chinese === previousWord.chinese) {
          wordIndex = i;
          break;
        }
      }
      
      if (wordIndex !== -1) {
        self.currentIndex = wordIndex;
      } else {
        self.currentIndex = Math.min(previousState.currentIndex, self.currentWords.length - 1);
        
        if (self.currentWords.length === 0) {
          self.startNewRound();
          self.isTransitioning = false;
        return;
        }
      }
      
      self.displayCurrentWord();
      self.isTransitioning = false;
      
    }, APP_CONSTANTS.TRANSITION_DELAY_MS);
    this.renderDifficultyLevel();
  };

  FlashcardApp.prototype.saveNavigationState = function() {
    if (this.currentWords.length > 0 && this.currentIndex >= 0) {
      this.navigationHistory.push({
        currentIndex: this.currentIndex,
        wordSequence: this.currentWords.slice()
      });
      
      if (this.navigationHistory.length > APP_CONSTANTS.NAV_HISTORY_MAX) {
        this.navigationHistory.shift();
      }
    }
  };

  FlashcardApp.prototype.confirmRestart = function() {
    var self = this;
    this.customConfirm({
      title: '🔄 重新載入單字',
      message: '確定要重新載入單字嗎？',
      warning: '⚠️ 注意：重新載入會恢復所有暫時刪除的單字。',
      confirmText: '確定',
      cancelText: '取消'
    }, function() {
      self.restart();
    });
  };

  FlashcardApp.prototype.restart = function() {
    this.clearAllTimersAndSpeech();
    this.pendingRemoval = null;
    this.closeMenu();
    
    if (this.sheetSettings.sheetId && this.sheetSettings.selectedSheets.length > 0) {
      console.log('重新載入單字，使用已設定的 Google Sheet');
      var loadingDiv = document.getElementById('loading');
      var flashcardDiv = document.getElementById('flashcard');

      try {
        var lastWord = JSON.parse(localStorage.getItem(APP_CONSTANTS.STORAGE_KEYS.LAST_WORD));
        if (lastWord && lastWord.english && lastWord.chinese) {
          var elEn = document.getElementById('loading-word-english');
          var elZh = document.getElementById('loading-word-chinese');
          if (elEn) elEn.textContent = lastWord.english;
          if (elZh) elZh.textContent = lastWord.chinese;
        }
      } catch (e) {}

      if (loadingDiv) loadingDiv.style.display = 'flex';
      if (flashcardDiv) flashcardDiv.style.display = 'none';
      
      var self = this;
      this.loadWords(true, function(hasDuplicates) {
        self.hideLoading();
        self.applySettings();
        if (!hasDuplicates) {
          self._flagSrsRestoreBeforeNewRound();
          self.startNewRound();
        }
      });
    } else {
      console.log('沒有 Google Sheet 設定，直接重新開始');
      this._flagSrsRestoreBeforeNewRound();
      this.startNewRound();
    }
  };

  FlashcardApp.prototype.togglePause = function() {
    if (this.userPaused) {
      this.userPaused = false;
      this.resumeTimer();
    } else {
      this.userPaused = true;
      this.pauseTimer();
      this.syncReviewDates();
    }
    this.updatePauseButtonState();
  };

  FlashcardApp.prototype.updatePauseButtonState = function() {
    var pauseBtn = document.getElementById('pause-btn');
    var controlsWrapper = document.getElementById('controls-wrapper');
    var pausedIndicator = document.getElementById('paused-indicator');
    
    if (pauseBtn) {
      if (this.userPaused) {
        pauseBtn.textContent = '▶️';
        pauseBtn.title = '目前暫停中（點擊恢復）';
        pauseBtn.style.opacity = '0.6';
        
        if (pausedIndicator) {
          pausedIndicator.style.display = 'flex';
          pausedIndicator.title = '點擊此處恢復播放';
        }
      } else {
        pauseBtn.textContent = '⏸️';
        pauseBtn.title = '目前運行中（點擊暫停）';
        pauseBtn.style.opacity = '1';
        
        if (pausedIndicator) {
          pausedIndicator.style.display = 'none';
          pausedIndicator.title = '';
        }
      }
    }
  };

  FlashcardApp.prototype.redisplayCurrentWord = function() {
    this.clearAllTimersAndSpeech();
    
    if (this._pendingVeryFamiliar) {
      if (this._pendingVeryFamiliar.timer) {
        clearTimeout(this._pendingVeryFamiliar.timer);
      }
      this._pendingVeryFamiliar = null;
      this._vfSavedTimer = null;
      this.hideVeryFamiliarToast();
    }
    
    this.showingChinese = false;
    this.isTransitioning = false;
    this.isProcessingClick = false;
    this.pendingRemoval = null;
    this.hideRestoreButton();
    
    this.displayCurrentWord();
  };

</script>
