<script>
  /**
   * @module script-edit-word
   * @description 即時編輯單字模組：開啟/關閉編輯模態框、設置事件監聽器、
   *   圖片預覽、不熟程度顯示、儲存編輯結果並同步到後端。
   *
   * @dependencies script-core.html (FlashcardApp, APP_CONSTANTS, closeModalById)
   * @provides FlashcardApp.prototype: openEditWordModal(optWord), closeEditWordModal,
   *   updateEditWordDifficultyColor, setupEditWordListeners,
   *   updateEditWordImagePreview, saveEditWord
   */

  // ==========================================================================
  // 編輯單字功能
  // ==========================================================================

  // 開啟編輯單字模態框（可選傳入 optWord：由搜尋等流程指定單字，否則使用當前卡片）
  FlashcardApp.prototype.openEditWordModal = function(optWord) {
    var currentWord = optWord || this.currentWords[this.currentIndex];
    if (!currentWord) {
      alert('目前沒有可編輯的單字');
      return;
    }

    // 記住編輯前的暫停狀態，編輯完成後恢復
    this._wasPausedBeforeEdit = this.userPaused;
    if (!this.userPaused) {
      this.userPaused = true;
      this.pauseTimer();
      this.updatePauseButtonState();
    }

    // 設置初始事件監聽器（只需一次）
    this.setupEditWordListeners();

    // 填入當前單字資料
    var englishInput = document.getElementById('edit-word-english');
    var chineseInput = document.getElementById('edit-word-chinese');
    var difficultyInput = document.getElementById('edit-word-difficulty');
    var difficultyValue = document.getElementById('edit-word-difficulty-value');
    var imageInput = document.getElementById('edit-word-image');
    var sheetNameEl = document.getElementById('edit-word-sheet-name');

    if (englishInput) englishInput.value = currentWord.english || '';
    if (chineseInput) chineseInput.value = currentWord.chinese || '';
    var difficultyNumberInput = document.getElementById('edit-word-difficulty-number');
    if (difficultyInput || difficultyNumberInput) {
      var diffLevel = (currentWord.difficultyLevel !== undefined && currentWord.difficultyLevel !== null) ? currentWord.difficultyLevel : 0;
      if (difficultyInput) difficultyInput.value = Math.max(-1, Math.min(10, diffLevel));
      if (difficultyNumberInput) difficultyNumberInput.value = diffLevel;
    }
    if (difficultyValue) {
      var level = (currentWord.difficultyLevel !== undefined && currentWord.difficultyLevel !== null) ? currentWord.difficultyLevel : 0;
      difficultyValue.textContent = level <= APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR ? '✓ 已掌握' : (level < 0 ? '★0' : '★' + level);
      this.updateEditWordDifficultyColor(level);
    }
    if (imageInput) imageInput.value = currentWord.image || '';
    if (sheetNameEl) sheetNameEl.textContent = currentWord.sheetName || '未知';

    var mustSpellToggle = document.getElementById('edit-word-must-spell');
    if (mustSpellToggle) mustSpellToggle.checked = !!currentWord.mustSpell;

    var tagsInput = document.getElementById('edit-word-tags');
    if (tagsInput) tagsInput.value = (currentWord.tags && currentWord.tags.length > 0) ? currentWord.tags.join(', ') : '';

    // 更新圖片預覽
    this.updateEditWordImagePreview(currentWord.image || '');

    // 記住正在編輯的單字 ID
    this._editingWordId = currentWord.id;

    var modal = document.getElementById('edit-word-modal');
    if (modal) modal.style.display = 'flex';
  };

  // 關閉編輯單字模態框
  FlashcardApp.prototype.closeEditWordModal = function() {
    closeModalById(this, 'edit-word-modal');
    this._editingWordId = undefined;

    // 恢復編輯前的暫停狀態
    if (!this._wasPausedBeforeEdit) {
      this.userPaused = false;
      this.updatePauseButtonState();
      this.resumeTimer();
    }
    this._wasPausedBeforeEdit = undefined;
  };

  // 更新不熟程度滑桿的顯示顏色
  FlashcardApp.prototype.updateEditWordDifficultyColor = function(level) {
    var valueEl = document.getElementById('edit-word-difficulty-value');
    if (!valueEl) return;

    valueEl.className = valueEl.className.replace(/\bdifficulty-level-n1\b/g, '').trim();
    for (var i = 0; i <= 10; i++) {
      valueEl.className = valueEl.className.replace(new RegExp('\\bdifficulty-level-' + i + '\\b', 'g'), '').trim();
    }
    var cls = level < 0 ? 'difficulty-level-n1' : 'difficulty-level-' + level;
    valueEl.className = (valueEl.className + ' ' + cls).trim();
  };

  // 設置編輯單字模態框事件監聽器
  FlashcardApp.prototype.setupEditWordListeners = function() {
    if (this._editWordListenersSetup) return;
    this._editWordListenersSetup = true;

    var self = this;
    var modal = document.getElementById('edit-word-modal');
    var closeBtn = document.getElementById('close-edit-word');
    var cancelBtn = document.getElementById('cancel-edit-word');
    var saveBtn = document.getElementById('save-edit-word');
    var difficultyInput = document.getElementById('edit-word-difficulty');
    var difficultyNumberInput = document.getElementById('edit-word-difficulty-number');

    if (closeBtn) {
      closeBtn.addEventListener('click', function() { self.closeEditWordModal(); });
    }
    if (cancelBtn) {
      cancelBtn.addEventListener('click', function() { self.closeEditWordModal(); });
    }
    if (saveBtn) {
      saveBtn.addEventListener('click', function() { self.saveEditWord(); });
    }

    var updateDiffDisplay = function(val) {
      var valueEl = document.getElementById('edit-word-difficulty-value');
      if (valueEl) {
        valueEl.textContent = val <= APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR ? '✓ 已掌握' : (val < 0 ? '★0' : '★' + val);
        self.updateEditWordDifficultyColor(val);
      }
    };

    if (difficultyInput) {
      var onSliderChange = function() {
        var val = parseInt(difficultyInput.value);
        if (isNaN(val)) val = 0;
        if (difficultyNumberInput) difficultyNumberInput.value = val;
        updateDiffDisplay(val);
      };
      difficultyInput.addEventListener('input', onSliderChange);
      difficultyInput.addEventListener('change', onSliderChange);
    }

    if (difficultyNumberInput) {
      var onNumberChange = function() {
        var val = parseInt(difficultyNumberInput.value);
        if (isNaN(val)) val = 0;
        val = Math.max(APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR, Math.min(10, val));
        difficultyNumberInput.value = val;
        if (difficultyInput) difficultyInput.value = Math.max(-1, Math.min(10, val));
        updateDiffDisplay(val);
      };
      difficultyNumberInput.addEventListener('input', onNumberChange);
      difficultyNumberInput.addEventListener('change', onNumberChange);
    }
    // 圖片 URL 輸入框變更時更新預覽
    var imageInput = document.getElementById('edit-word-image');
    if (imageInput) {
      var previewTimer = null;
      var handleImageChange = function() {
        if (previewTimer) clearTimeout(previewTimer);
        previewTimer = setTimeout(function() {
          self.updateEditWordImagePreview(imageInput.value.trim());
        }, APP_CONSTANTS.IMAGE_PREVIEW_DEBOUNCE_MS);
      };
      imageInput.addEventListener('input', handleImageChange);
      imageInput.addEventListener('change', handleImageChange);
    }

    // Enter 鍵觸發儲存（在文字/數字輸入框按下時直接儲存，免用滑鼠點確定）
    // 但中文等 IME 選字過程中按下的 Enter 不應該觸發儲存：
    //   1. e.isComposing === true（現代瀏覽器在 composition 進行中設定為 true）
    //   2. e.keyCode === 229（部分瀏覽器在 IME 處理 Enter 時會回傳此特殊值）
    //   3. compositionend 後同一個 Enter 事件可能緊接著觸發（透過旗標過濾）
    var inputIds = [
      'edit-word-english', 'edit-word-chinese',
      'edit-word-image', 'edit-word-tags',
      'edit-word-difficulty-number'
    ];
    for (var k = 0; k < inputIds.length; k++) {
      var inputEl = document.getElementById(inputIds[k]);
      if (inputEl) {
        inputEl._isComposingIme = false;
        inputEl.addEventListener('compositionstart', function() {
          this._isComposingIme = true;
        });
        inputEl.addEventListener('compositionend', function() {
          var el = this;
          el._isComposingIme = false;
          // compositionend 之後，瀏覽器可能會緊接派發一個 keydown(Enter)
          // 設定短暫旗標避免誤觸發儲存（Safari/部分中文輸入法行為）
          el._justFinishedComposition = true;
          setTimeout(function() { el._justFinishedComposition = false; }, 50);
        });
        inputEl.addEventListener('keydown', function(e) {
          if (e.keyCode !== 13 && e.key !== 'Enter') return;
          if (document.activeElement !== this) return;
          if (this._isComposingIme || this._justFinishedComposition) return;
          if (e.isComposing === true || e.keyCode === 229) return;
          e.preventDefault();
          e.stopPropagation();
          self.saveEditWord();
        });
      }
    }

    // 點擊圖片預覽以開啟全畫面放大檢視
    var previewImgEl = document.getElementById('edit-word-image-preview-img');
    if (previewImgEl) {
      previewImgEl.style.cursor = 'zoom-in';
      previewImgEl.title = '點擊放大檢視';
      previewImgEl.addEventListener('click', function() {
        var src = previewImgEl.getAttribute('src');
        if (!src) return;
        if (previewImgEl.style.display === 'none') return;
        self.openImageLightbox(src);
      });
    }

    if (modal) {
      modal.addEventListener('click', function(e) {
        if (isModalBackgroundClick(e, modal)) {
          self.closeEditWordModal();
        }
      });
    }
  };

  // 開啟圖片放大檢視（lightbox）：點擊預覽圖片時呼叫
  FlashcardApp.prototype.openImageLightbox = function(url) {
    if (!url) return;

    // 如果已存在則先移除（避免重複疊加）
    var existing = document.getElementById('image-lightbox-overlay');
    if (existing && existing.parentNode) existing.parentNode.removeChild(existing);

    var overlay = document.createElement('div');
    overlay.id = 'image-lightbox-overlay';
    overlay.className = 'image-lightbox-overlay';

    var img = document.createElement('img');
    img.className = 'image-lightbox-img';
    img.src = url;
    img.alt = '放大圖片';

    var closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'image-lightbox-close';
    closeBtn.setAttribute('aria-label', '關閉');
    closeBtn.innerHTML = '&times;';

    overlay.appendChild(img);
    overlay.appendChild(closeBtn);
    document.body.appendChild(overlay);

    function closeLightbox() {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      document.removeEventListener('keydown', onKeyDown, true);
    }
    function onKeyDown(e) {
      if (e.key === 'Escape' || e.keyCode === 27) {
        e.preventDefault();
        e.stopPropagation();
        closeLightbox();
      }
    }

    overlay.addEventListener('click', function(e) {
      // 點擊背景或圖片本身（zoom-out）皆關閉
      if (e.target === overlay || e.target === img || e.target === closeBtn) {
        closeLightbox();
      }
    });
    // 使用 capture 階段攔截 Escape，避免被外層 modal 處理
    document.addEventListener('keydown', onKeyDown, true);
  };

  // 更新編輯模態框的圖片預覽
  FlashcardApp.prototype.updateEditWordImagePreview = function(url) {
    var previewContainer = document.getElementById('edit-word-image-preview');
    var previewImg = document.getElementById('edit-word-image-preview-img');
    var previewError = document.getElementById('edit-word-image-preview-error');
    if (!previewContainer || !previewImg || !previewError) return;

    if (!url) {
      previewContainer.style.display = 'none';
      previewImg.src = '';
      return;
    }

    // 顯示預覽區、隱藏錯誤
    previewContainer.style.display = 'block';
    previewError.style.display = 'none';
    previewImg.style.display = 'block';

    previewImg.onload = function() {
      previewImg.style.display = 'block';
      previewError.style.display = 'none';
    };
    previewImg.onerror = function() {
      previewImg.style.display = 'none';
      previewError.style.display = 'block';
    };

    previewImg.src = url;
  };

  // 儲存編輯的單字
  FlashcardApp.prototype.saveEditWord = function() {
    var self = this;
    var wordId = this._editingWordId;
    if (wordId === undefined) return;

    var englishInput = document.getElementById('edit-word-english');
    var chineseInput = document.getElementById('edit-word-chinese');
    var difficultyNumberInput = document.getElementById('edit-word-difficulty-number');
    var difficultyInput = document.getElementById('edit-word-difficulty');
    var imageInput = document.getElementById('edit-word-image');
    var mustSpellToggle = document.getElementById('edit-word-must-spell');

    var newEnglish = englishInput ? englishInput.value.trim() : '';
    var newChinese = chineseInput ? chineseInput.value.trim() : '';
    var newDifficulty = difficultyNumberInput ? parseInt(difficultyNumberInput.value) : (difficultyInput ? parseInt(difficultyInput.value) : 0);
    if (isNaN(newDifficulty)) newDifficulty = 0;
    newDifficulty = Math.max(APP_CONSTANTS.DIFFICULTY_VERY_FAMILIAR, Math.min(10, newDifficulty));
    var newImage = imageInput ? imageInput.value.trim() : '';
    var newMustSpell = mustSpellToggle ? mustSpellToggle.checked : false;

    var tagsInput = document.getElementById('edit-word-tags');
    var newTags = [];
    if (tagsInput && tagsInput.value.trim()) {
      var rawParts = tagsInput.value.split(/[,，]/);
      for (var ti = 0; ti < rawParts.length; ti++) {
        var tag = rawParts[ti].trim();
        if (tag) newTags.push(tag);
      }
    }

    if (!newEnglish || !newChinese) {
      alert('單字和翻譯不能為空');
      return;
    }

    // 找到原始單字
    var word = null;
    var wordIdx = -1;
    for (var i = 0; i < this.words.length; i++) {
      if (this.words[i].id === wordId) {
        word = this.words[i];
        wordIdx = i;
        break;
      }
    }

    if (!word) {
      alert('找不到要編輯的單字');
      this.closeEditWordModal();
      return;
    }

    // 準備更新的屬性
    var properties = {
      english: newEnglish,
      chinese: newChinese,
      difficultyLevel: newDifficulty,
      imageUrl: newImage,
      mustSpell: newMustSpell,
      tags: newTags
    };

    // 更新本地資料（主陣列）
    word.english = newEnglish;
    word.chinese = newChinese;
    word.difficultyLevel = newDifficulty;
    word.image = newImage;
    word.mustSpell = newMustSpell;
    word.tags = newTags;

    // 同步更新 currentWords 中的對應項目
    for (var j = 0; j < this.currentWords.length; j++) {
      if (this.currentWords[j].id === wordId) {
        this.currentWords[j].english = newEnglish;
        this.currentWords[j].chinese = newChinese;
        this.currentWords[j].difficultyLevel = newDifficulty;
        this.currentWords[j].image = newImage;
        this.currentWords[j].mustSpell = newMustSpell;
        this.currentWords[j].tags = newTags;
        break;
      }
    }

    // 呼叫後端更新 Google Sheet
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      var rowIndex = word.originalRowIndex;
      if (rowIndex !== undefined && rowIndex !== -1) {
        var sheetId = this.sheetSettings.sheetId;
        var sheetName = word.sheetName || 'Sheet1';
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.success) {
              console.log('單字屬性已同步到後端');
            } else {
              console.error('後端更新失敗:', result ? result.error : '未知錯誤');
            }
          })
          .withFailureHandler(function(error) {
            console.error('後端更新單字屬性失敗:', error);
          })
          .updateWordProperties(sheetId, sheetName, rowIndex, properties);
      }
    }

    // 更新畫面顯示
    this.displayCurrentWord();
    this.renderDifficultyLevel();

    this.closeEditWordModal();
    console.log('單字已更新:', newEnglish, '-', newChinese, '★' + newDifficulty);
  };

</script>
