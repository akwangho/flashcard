<script>
  /**
   * @module script-filter
   * @description 篩選模組：複習時間篩選、不熟程度篩選、要會拼篩選、類型篩選、標籤篩選、
   *   篩選指示器、篩選清除。
   *
   * @dependencies script-core.html (FlashcardApp, APP_CONSTANTS, formatDateYYYYMMDD, closeModalById)
   * @provides FlashcardApp.prototype: getTodayDateString, markWordAsReviewed,
   *   syncReviewDates, applyAllFilters, getFilterCutoffDate, countWordsForFilter,
   *   openReviewFilterModal, openDifficultyFilterModal, toggleMustSpellFilter,
   *   openTypeFilterModal, openTagFilterModal, updateActiveFilterDisplay, clearAllFilters ...
   */

  // ===========================================
  // 複習時間篩選功能
  // ===========================================

  // 取得今天的日期字串 YYYY-MM-DD（使用共用工具函式）
  FlashcardApp.prototype.getTodayDateString = function() {
    return formatDateYYYYMMDD(new Date());
  };

  // 標記單字為已複習（記錄到記憶體，稍後批次同步）
  FlashcardApp.prototype.markWordAsReviewed = function(word) {
    if (!word || !word.sheetName || word.sheetName === 'Demo') return;
    
    var key = word.sheetName + ':' + word.originalRowIndex;
    var today = this.getTodayDateString();
    
    // 避免同一輪重複記錄
    if (this.reviewedInSession[key] === today) return;
    
    this.reviewedInSession[key] = today;
    
    // 同時更新記憶體中的 word 物件
    word.lastReviewDate = today;
    
    // 更新 SRS 資料
    this.updateSrsData(word);
    
    // 檢查是否達到同步閾值
    var count = 0;
    for (var k in this.reviewedInSession) {
      if (this.reviewedInSession.hasOwnProperty(k)) {
        count++;
      }
    }
    
    if (count >= this.reviewSyncThreshold && !this.reviewSyncPending) {
      console.log('已複習單字達到', this.reviewSyncThreshold, '個，自動同步');
      this.syncReviewDates();
    }
  };

  // 批次同步複習日期到 Google Sheet
  FlashcardApp.prototype.syncReviewDates = function() {
    var keys = [];
    for (var k in this.reviewedInSession) {
      if (this.reviewedInSession.hasOwnProperty(k)) {
        keys.push(k);
      }
    }
    
    if (keys.length === 0 || this.reviewSyncPending) return;
    if (!this.sheetSettings.sheetId) return;
    
    console.log('同步複習日期，數量:', keys.length);
    this.reviewSyncPending = true;
    
    var updates = [];
    for (var i = 0; i < keys.length; i++) {
      var parts = keys[i].split(':');
      updates.push({
        sheetName: parts[0],
        rowIndex: parseInt(parts[1], 10),
        date: this.reviewedInSession[keys[i]]
      });
    }
    
    var self = this;
    var currentBatch = {}; // 保存目前這批的 keys
    for (var j = 0; j < keys.length; j++) {
      currentBatch[keys[j]] = true;
    }
    
    google.script.run
      .withSuccessHandler(function(result) {
        console.log('複習日期同步結果:', result);
        self.reviewSyncPending = false;
        
        // 只清除已成功同步的項目
        if (result && result.success) {
          for (var k in currentBatch) {
            if (currentBatch.hasOwnProperty(k)) {
              delete self.reviewedInSession[k];
            }
          }
        }
      })
      .withFailureHandler(function(error) {
        console.error('複習日期同步失敗:', error);
        self.reviewSyncPending = false;
      })
      .batchUpdateReviewDates(this.sheetSettings.sheetId, updates);
  };

  // 套用所有篩選條件（不熟單字 + 複習時間）
  // 判斷單字類型：sentence（句號/問號/驚嘆號結尾）、phrase（含空格）、word（其他）
  function getWordType(english) {
    var trimmed = (english || '').trim();
    var last = trimmed.charAt(trimmed.length - 1);
    if (last === '.' || last === '?' || last === '!') return 'sentence';
    if (trimmed.indexOf(' ') !== -1) return 'phrase';
    return 'word';
  }

  FlashcardApp.prototype.applyAllFilters = function(words) {
    var filtered = words.slice();
    var self = this;
    
    // 篩選 1：不熟程度篩選
    if (this.difficultyFilter < 0) {
      // 特殊篩選：只顯示非常熟（-999）的單字
      filtered = filtered.filter(function(w) {
        return w.difficultyLevel <= -999;
      });
    } else {
      // 預設排除 -999（非常熟）的單字，-1~-998 仍正常出現
      filtered = filtered.filter(function(w) {
        return w.difficultyLevel > -999 || w.difficultyLevel === undefined || w.difficultyLevel === null;
      });
      // 再套用 >= 篩選
      if (this.difficultyFilter > 0) {
        filtered = filtered.filter(function(w) {
          return (w.difficultyLevel || 0) >= self.difficultyFilter;
        });
      }
    }
    
    // 篩選 2：複習時間篩選
    if (this.reviewFilter !== 'all') {
      var cutoffDate = this.getFilterCutoffDate(this.reviewFilter);
      filtered = filtered.filter(function(w) {
        if (self.reviewFilter === 'never') {
          return !w.lastReviewDate || w.lastReviewDate === '';
        }
        // 從未複習的單字也包含在時間篩選中（視為更久沒複習）
        if (!w.lastReviewDate || w.lastReviewDate === '') {
          return true;
        }
        // 比較日期字串 YYYY-MM-DD（字串比較即可）
        return w.lastReviewDate < cutoffDate;
      });
    }
    
    // 篩選 3：要會拼篩選
    if (this.mustSpellFilter) {
      filtered = filtered.filter(function(w) {
        return w.mustSpell;
      });
    }

    // 篩選 4：類型篩選（全選時不篩選）
    if (this.typeFilter.length < 3) {
      var typeFilterSet = this.typeFilter;
      filtered = filtered.filter(function(w) {
        var type = getWordType(w.english);
        for (var i = 0; i < typeFilterSet.length; i++) {
          if (typeFilterSet[i] === type) return true;
        }
        return false;
      });
    }

    // 篩選 5：標籤篩選（OR 邏輯，含任一所選標籤即顯示）
    if (this.tagFilter.length > 0) {
      var tagFilterSet = this.tagFilter;
      filtered = filtered.filter(function(w) {
        if (!w.tags || w.tags.length === 0) return false;
        for (var i = 0; i < tagFilterSet.length; i++) {
          for (var j = 0; j < w.tags.length; j++) {
            if (w.tags[j] === tagFilterSet[i]) return true;
          }
        }
        return false;
      });
    }
    
    // 篩選後重新打亂順序，確保多工作表的單字充分混合
    this.shuffleArray(filtered);
    
    return filtered;
  };

  // 取得篩選截止日期
  FlashcardApp.prototype.getFilterCutoffDate = function(filterType) {
    var now = new Date();
    var cutoff;
    
    var days = APP_CONSTANTS.FILTER_DAYS[filterType];
    if (!days) return '9999-12-31'; // 不篩選
    
    cutoff = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
    return formatDateYYYYMMDD(cutoff);
  };

  // 計算各複習時間篩選條件符合的單字數量
  FlashcardApp.prototype.countWordsForFilter = function(filterType) {
    var words = this.words;
    
    // 如果同時啟用了不熟程度篩選，先套用
    if (this.difficultyFilter < 0) {
      words = words.filter(function(w) {
        return w.difficultyLevel <= -999;
      });
    } else {
      // 預設排除 -999（非常熟）的單字
      words = words.filter(function(w) {
        return w.difficultyLevel > -999 || w.difficultyLevel === undefined || w.difficultyLevel === null;
      });
      if (this.difficultyFilter > 0) {
        var minLevel = this.difficultyFilter;
        words = words.filter(function(w) {
          return (w.difficultyLevel || 0) >= minLevel;
        });
      }
    }
    
    // 如果同時啟用了要會拼篩選，先套用
    if (this.mustSpellFilter) {
      words = words.filter(function(w) {
        return w.mustSpell;
      });
    }
    
    if (filterType === 'all') {
      return words.length;
    }
    
    if (filterType === 'never') {
      return words.filter(function(w) {
        return !w.lastReviewDate || w.lastReviewDate === '';
      }).length;
    }
    
    var cutoffDate = this.getFilterCutoffDate(filterType);
    return words.filter(function(w) {
      if (!w.lastReviewDate || w.lastReviewDate === '') return true;
      return w.lastReviewDate < cutoffDate;
    }).length;
  };

  // 開啟複習時間篩選模態框
  FlashcardApp.prototype.openReviewFilterModal = function() {
    console.log('開啟複習時間篩選模態框');
    this.pauseTimer();
    
    var modal = document.getElementById('review-filter-modal');
    if (!modal) return;
    
    // 更新各選項的單字數量
    var filters = ['all', 'never', '2weeks', '1month', '3months', '6months'];
    for (var i = 0; i < filters.length; i++) {
      var countEl = document.getElementById('review-count-' + filters[i]);
      if (countEl) {
        var count = this.countWordsForFilter(filters[i]);
        countEl.textContent = '(' + count + ' 個)';
      }
    }
    
    // 設定目前選中的篩選條件
    var radios = modal.querySelectorAll('input[name="review-filter"]');
    for (var j = 0; j < radios.length; j++) {
      radios[j].checked = (radios[j].value === this.reviewFilter);
    }
    
    modal.style.display = 'flex';
    
    // 設置模態框事件（如果尚未設置）
    this.setupReviewFilterListeners();
  };

  // 關閉複習時間篩選模態框
  FlashcardApp.prototype.closeReviewFilterModal = function() {
    closeModalById(this, 'review-filter-modal');
  };

  // 設置複習篩選模態框事件監聽器
  FlashcardApp.prototype.setupReviewFilterListeners = function() {
    if (this._reviewFilterListenersSetup) return;
    this._reviewFilterListenersSetup = true;
    
    var self = this;
    var modal = document.getElementById('review-filter-modal');
    var closeBtn = document.getElementById('close-review-filter');
    var cancelBtn = document.getElementById('cancel-review-filter');
    var applyBtn = document.getElementById('apply-review-filter');
    
    if (closeBtn) {
      closeBtn.addEventListener('click', function() { self.closeReviewFilterModal(); });
    }
    if (cancelBtn) {
      cancelBtn.addEventListener('click', function() { self.closeReviewFilterModal(); });
    }
    if (applyBtn) {
      applyBtn.addEventListener('click', function() { self.applyReviewFilterFromModal(); });
    }
    if (modal) {
      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          self.closeReviewFilterModal();
        }
      });
    }
  };

  // 從模態框套用篩選條件
  FlashcardApp.prototype.applyReviewFilterFromModal = function() {
    var modal = document.getElementById('review-filter-modal');
    if (!modal) return;
    
    var radios = modal.querySelectorAll('input[name="review-filter"]');
    var selectedFilter = 'all';
    for (var i = 0; i < radios.length; i++) {
      if (radios[i].checked) {
        selectedFilter = radios[i].value;
        break;
      }
    }
    
    console.log('套用複習時間篩選:', selectedFilter);
    this.reviewFilter = selectedFilter;
    
    // 更新選單中的篩選按鈕文字（顯示目前的篩選狀態）
    this.updateReviewFilterButtonText();
    
    this.closeReviewFilterModal();
    
    // 重新打亂並套用篩選，開始新回合
    this.shuffleArray(this.words);
    this.currentWords = this.applyAllFilters(this.words);
    this.currentIndex = 0;
    this.removedWords = [];
    
    if (this.currentWords.length === 0) {
      var filterMsg = '沒有符合篩選條件的單字！篩選已重設為「全部」。';
      alert(filterMsg);
      this.reviewFilter = 'all';
      this.updateReviewFilterButtonText();
      this.currentWords = this.applyAllFilters(this.words);
    }
    
    this.displayCurrentWord();
    this.updateButtonStates();
    this.renderDifficultyLevel();
    this.updateActiveFilterDisplay();
  };

  // 更新選單中篩選按鈕的文字
  FlashcardApp.prototype.updateReviewFilterButtonText = function() {
    var btn = document.getElementById('review-filter-btn');
    if (!btn) return;
    
    var labels = {
      'all': '📅 複習時間篩選',
      'never': '📅 篩選：從未複習',
      '2weeks': '📅 篩選：超過2週',
      '1month': '📅 篩選：超過1個月',
      '3months': '📅 篩選：超過3個月',
      '6months': '📅 篩選：超過6個月'
    };
    
    btn.textContent = labels[this.reviewFilter] || labels['all'];
    
    // 如果有篩選條件啟用，在按鈕上加上標記
    if (this.reviewFilter !== 'all') {
      btn.style.color = '#FFA500';
    } else {
      btn.style.color = '';
    }
  };

  // ===================================================================
  // 不熟程度篩選模態框
  // ===================================================================

  // 開啟不熟程度篩選模態框
  FlashcardApp.prototype.openDifficultyFilterModal = function() {
    console.log('開啟不熟程度篩選模態框');
    this.pauseTimer();
    
    var modal = document.getElementById('difficulty-filter-modal');
    if (!modal) return;
    
    // 更新各選項的單字數量
    var levels = [-1, 0, 1, 3, 5, 7, 10];
    for (var i = 0; i < levels.length; i++) {
      var countId = 'diff-count-' + (levels[i] === -1 ? 'n1' : levels[i]);
      var countEl = document.getElementById(countId);
      if (countEl) {
        var count = this.countWordsForDifficultyFilter(levels[i]);
        countEl.textContent = '(' + count + ' 個)';
      }
    }
    
    // 設定目前選中的篩選條件
    var radios = modal.querySelectorAll('input[name="difficulty-filter"]');
    for (var j = 0; j < radios.length; j++) {
      radios[j].checked = (parseInt(radios[j].value) === this.difficultyFilter);
    }
    
    modal.style.display = 'flex';
    this.setupDifficultyFilterListeners();
  };

  // 關閉不熟程度篩選模態框
  FlashcardApp.prototype.closeDifficultyFilterModal = function() {
    closeModalById(this, 'difficulty-filter-modal');
  };

  // 設置不熟程度篩選模態框事件監聽器
  FlashcardApp.prototype.setupDifficultyFilterListeners = function() {
    if (this._difficultyFilterListenersSetup) return;
    this._difficultyFilterListenersSetup = true;
    
    var self = this;
    var modal = document.getElementById('difficulty-filter-modal');
    var closeBtn = document.getElementById('close-difficulty-filter');
    var cancelBtn = document.getElementById('cancel-difficulty-filter');
    var applyBtn = document.getElementById('apply-difficulty-filter');
    
    if (closeBtn) {
      closeBtn.addEventListener('click', function() { self.closeDifficultyFilterModal(); });
    }
    if (cancelBtn) {
      cancelBtn.addEventListener('click', function() { self.closeDifficultyFilterModal(); });
    }
    if (applyBtn) {
      applyBtn.addEventListener('click', function() { self.applyDifficultyFilterFromModal(); });
    }
    if (modal) {
      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          self.closeDifficultyFilterModal();
        }
      });
    }
  };

  // 從模態框套用不熟程度篩選
  FlashcardApp.prototype.applyDifficultyFilterFromModal = function() {
    var modal = document.getElementById('difficulty-filter-modal');
    if (!modal) return;
    
    var radios = modal.querySelectorAll('input[name="difficulty-filter"]');
    var selectedFilter = 0;
    for (var i = 0; i < radios.length; i++) {
      if (radios[i].checked) {
        selectedFilter = parseInt(radios[i].value);
        break;
      }
    }
    
    console.log('套用不熟程度篩選:', selectedFilter);
    this.difficultyFilter = selectedFilter;
    
    this.updateDifficultyFilterButtonText();
    this.closeDifficultyFilterModal();
    
    // 重新打亂並套用篩選
    this.shuffleArray(this.words);
    this.currentWords = this.applyAllFilters(this.words);
    this.currentIndex = 0;
    this.removedWords = [];
    
    if (this.currentWords.length === 0) {
      alert('沒有符合篩選條件的單字！篩選已重設為「全部」。');
      this.difficultyFilter = 0;
      this.updateDifficultyFilterButtonText();
      this.currentWords = this.applyAllFilters(this.words);
    }
    
    this.displayCurrentWord();
    this.updateButtonStates();
    this.renderDifficultyLevel();
    this.updateActiveFilterDisplay();
  };

  // 計算不熟程度篩選的單字數量
  FlashcardApp.prototype.countWordsForDifficultyFilter = function(minLevel) {
    var words = this.words;
    
    // 如果同時啟用了複習時間篩選，先套用
    if (this.reviewFilter !== 'all') {
      var self = this;
      var cutoffDate = this.getFilterCutoffDate(this.reviewFilter);
      words = words.filter(function(w) {
        if (self.reviewFilter === 'never') {
          return !w.lastReviewDate || w.lastReviewDate === '';
        }
        if (!w.lastReviewDate || w.lastReviewDate === '') return true;
        return w.lastReviewDate < cutoffDate;
      });
    }
    
    // 如果同時啟用了要會拼篩選，先套用
    if (this.mustSpellFilter) {
      words = words.filter(function(w) {
        return w.mustSpell;
      });
    }
    
    // 特殊：非常熟篩選只計算 difficultyLevel <= -999 的單字
    if (minLevel < 0) {
      return words.filter(function(w) {
        return w.difficultyLevel <= -999;
      }).length;
    }
    
    // 0 = 全部（但排除 -999）
    if (minLevel === 0) {
      return words.filter(function(w) {
        return w.difficultyLevel > -999 || w.difficultyLevel === undefined || w.difficultyLevel === null;
      }).length;
    }
    
    // >= minLevel（排除 -999）
    return words.filter(function(w) {
      return (w.difficultyLevel > -999 || w.difficultyLevel === undefined || w.difficultyLevel === null) && (w.difficultyLevel || 0) >= minLevel;
    }).length;
  };

  // 更新不熟程度篩選按鈕文字
  FlashcardApp.prototype.updateDifficultyFilterButtonText = function() {
    var btn = document.getElementById('difficulty-filter-btn');
    if (!btn) return;
    
    if (this.difficultyFilter < 0) {
      btn.textContent = '⭐ 篩選：非常熟';
      btn.style.color = '#00CC00';
    } else if (this.difficultyFilter > 0) {
      btn.textContent = '⭐ 篩選：★' + this.difficultyFilter + ' 以上';
      btn.style.color = '#FFA500';
    } else {
      btn.textContent = '⭐ 不熟程度篩選';
      btn.style.color = '';
    }
  };

  // ===================================================================
  // 要會拼篩選
  // ===================================================================

  // 切換要會拼篩選
  FlashcardApp.prototype.toggleMustSpellFilter = function() {
    this.mustSpellFilter = !this.mustSpellFilter;
    console.log('切換要會拼篩選:', this.mustSpellFilter);
    this.updateMustSpellFilterButtonText();
    this.reapplyFilters();
  };

  // 更新要會拼篩選按鈕文字
  FlashcardApp.prototype.updateMustSpellFilterButtonText = function() {
    var btn = document.getElementById('must-spell-filter-btn');
    if (!btn) return;
    
    if (this.mustSpellFilter) {
      btn.textContent = '✍️ 篩選：要會拼';
      btn.style.color = '#87CEEB';
    } else {
      btn.textContent = '✍️ 要會拼篩選';
      btn.style.color = '';
    }
  };

  // ===================================================================
  // 類型篩選功能
  // ===================================================================

  // 開啟類型篩選模態框
  FlashcardApp.prototype.openTypeFilterModal = function() {
    console.log('開啟類型篩選模態框');
    this.pauseTimer();

    var modal = document.getElementById('type-filter-modal');
    if (!modal) return;

    // 計算各類型的單字數量（使用原始 words，不含其他篩選）
    var counts = { word: 0, phrase: 0, sentence: 0 };
    for (var i = 0; i < this.words.length; i++) {
      var type = getWordType(this.words[i].english);
      counts[type]++;
    }

    var types = ['word', 'phrase', 'sentence'];
    for (var t = 0; t < types.length; t++) {
      var countEl = document.getElementById('type-count-' + types[t]);
      if (countEl) {
        countEl.textContent = '(' + counts[types[t]] + ' 個)';
      }
    }

    // 設定目前選中的篩選條件
    var checkboxes = modal.querySelectorAll('input[name="type-filter"]');
    for (var j = 0; j < checkboxes.length; j++) {
      var val = checkboxes[j].value;
      checkboxes[j].checked = false;
      for (var k = 0; k < this.typeFilter.length; k++) {
        if (this.typeFilter[k] === val) {
          checkboxes[j].checked = true;
          break;
        }
      }
    }

    modal.style.display = 'flex';
    this.setupTypeFilterListeners();
  };

  // 關閉類型篩選模態框
  FlashcardApp.prototype.closeTypeFilterModal = function() {
    closeModalById(this, 'type-filter-modal');
  };

  // 設置類型篩選模態框事件監聽器
  FlashcardApp.prototype.setupTypeFilterListeners = function() {
    if (this._typeFilterListenersSetup) return;
    this._typeFilterListenersSetup = true;

    var self = this;
    var modal = document.getElementById('type-filter-modal');
    var closeBtn = document.getElementById('close-type-filter');
    var cancelBtn = document.getElementById('cancel-type-filter');
    var applyBtn = document.getElementById('apply-type-filter');

    if (closeBtn) {
      closeBtn.addEventListener('click', function() { self.closeTypeFilterModal(); });
    }
    if (cancelBtn) {
      cancelBtn.addEventListener('click', function() { self.closeTypeFilterModal(); });
    }
    if (applyBtn) {
      applyBtn.addEventListener('click', function() { self.applyTypeFilterFromModal(); });
    }
    if (modal) {
      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          self.closeTypeFilterModal();
        }
      });
    }
  };

  // 從模態框套用類型篩選
  FlashcardApp.prototype.applyTypeFilterFromModal = function() {
    var modal = document.getElementById('type-filter-modal');
    if (!modal) return;

    var checkboxes = modal.querySelectorAll('input[name="type-filter"]');
    var selected = [];
    for (var i = 0; i < checkboxes.length; i++) {
      if (checkboxes[i].checked) {
        selected.push(checkboxes[i].value);
      }
    }

    if (selected.length === 0) {
      alert('請至少選擇一種類型！');
      return;
    }

    console.log('套用類型篩選:', selected);
    this.typeFilter = selected;

    this.updateTypeFilterButtonText();
    this.closeTypeFilterModal();

    this.shuffleArray(this.words);
    this.currentWords = this.applyAllFilters(this.words);
    this.currentIndex = 0;
    this.removedWords = [];

    if (this.currentWords.length === 0) {
      alert('沒有符合篩選條件的單字！篩選已重設為「全部」。');
      this.typeFilter = ['word', 'phrase', 'sentence'];
      this.updateTypeFilterButtonText();
      this.currentWords = this.applyAllFilters(this.words);
    }

    this.displayCurrentWord();
    this.updateButtonStates();
    this.renderDifficultyLevel();
    this.updateActiveFilterDisplay();
  };

  // 更新類型篩選按鈕文字
  FlashcardApp.prototype.updateTypeFilterButtonText = function() {
    var btn = document.getElementById('type-filter-btn');
    if (!btn) return;

    var labels = { word: '單字', phrase: '片語', sentence: '句子' };
    if (this.typeFilter.length >= 3) {
      btn.textContent = '📝 類型篩選';
      btn.style.color = '';
    } else {
      var names = [];
      for (var i = 0; i < this.typeFilter.length; i++) {
        names.push(labels[this.typeFilter[i]]);
      }
      btn.textContent = '📝 篩選：' + names.join('、');
      btn.style.color = '#87CEEB';
    }
  };

  // ===================================================================
  // 標籤篩選功能
  // ===================================================================

  // 開啟標籤篩選模態框
  FlashcardApp.prototype.openTagFilterModal = function() {
    console.log('開啟標籤篩選模態框');
    this.pauseTimer();

    var modal = document.getElementById('tag-filter-modal');
    var optionsContainer = document.getElementById('tag-filter-options');
    var emptyMsg = document.getElementById('tag-filter-empty');
    if (!modal || !optionsContainer) return;

    // 收集所有唯一標籤及數量
    var tagCounts = {};
    for (var i = 0; i < this.words.length; i++) {
      var w = this.words[i];
      if (w.tags && w.tags.length > 0) {
        for (var j = 0; j < w.tags.length; j++) {
          var tag = w.tags[j];
          tagCounts[tag] = (tagCounts[tag] || 0) + 1;
        }
      }
    }

    // 取得所有標籤名稱並排序
    var allTags = [];
    for (var key in tagCounts) {
      if (tagCounts.hasOwnProperty(key)) {
        allTags.push(key);
      }
    }
    allTags.sort();

    // 動態生成 checkbox 列表
    optionsContainer.innerHTML = '';

    if (allTags.length === 0) {
      if (emptyMsg) emptyMsg.style.display = 'block';
    } else {
      if (emptyMsg) emptyMsg.style.display = 'none';
      for (var k = 0; k < allTags.length; k++) {
        var tagName = allTags[k];
        var isChecked = false;
        for (var c = 0; c < this.tagFilter.length; c++) {
          if (this.tagFilter[c] === tagName) { isChecked = true; break; }
        }

        var label = document.createElement('label');
        label.className = 'review-filter-option';

        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.name = 'tag-filter';
        checkbox.value = tagName;
        checkbox.checked = isChecked;

        var span = document.createElement('span');
        span.className = 'review-filter-label';
        span.textContent = tagName;

        var countSpan = document.createElement('span');
        countSpan.className = 'review-filter-count';
        countSpan.textContent = '(' + tagCounts[tagName] + ' 個)';

        label.appendChild(checkbox);
        label.appendChild(span);
        label.appendChild(countSpan);
        optionsContainer.appendChild(label);
      }
    }

    modal.style.display = 'flex';
    this.setupTagFilterListeners();
  };

  // 關閉標籤篩選模態框
  FlashcardApp.prototype.closeTagFilterModal = function() {
    closeModalById(this, 'tag-filter-modal');
  };

  // 設置標籤篩選模態框事件監聽器
  FlashcardApp.prototype.setupTagFilterListeners = function() {
    if (this._tagFilterListenersSetup) return;
    this._tagFilterListenersSetup = true;

    var self = this;
    var modal = document.getElementById('tag-filter-modal');
    var closeBtn = document.getElementById('close-tag-filter');
    var cancelBtn = document.getElementById('cancel-tag-filter');
    var applyBtn = document.getElementById('apply-tag-filter');

    if (closeBtn) {
      closeBtn.addEventListener('click', function() { self.closeTagFilterModal(); });
    }
    if (cancelBtn) {
      cancelBtn.addEventListener('click', function() { self.closeTagFilterModal(); });
    }
    if (applyBtn) {
      applyBtn.addEventListener('click', function() { self.applyTagFilterFromModal(); });
    }
    if (modal) {
      modal.addEventListener('click', function(e) {
        if (e.target === modal) {
          self.closeTagFilterModal();
        }
      });
    }
  };

  // 從模態框套用標籤篩選
  FlashcardApp.prototype.applyTagFilterFromModal = function() {
    var modal = document.getElementById('tag-filter-modal');
    if (!modal) return;

    var checkboxes = modal.querySelectorAll('input[name="tag-filter"]');
    var selected = [];
    for (var i = 0; i < checkboxes.length; i++) {
      if (checkboxes[i].checked) {
        selected.push(checkboxes[i].value);
      }
    }

    console.log('套用標籤篩選:', selected);
    this.tagFilter = selected;

    this.updateTagFilterButtonText();
    this.closeTagFilterModal();

    this.shuffleArray(this.words);
    this.currentWords = this.applyAllFilters(this.words);
    this.currentIndex = 0;
    this.removedWords = [];

    if (this.currentWords.length === 0) {
      alert('沒有符合篩選條件的單字！篩選已重設。');
      this.tagFilter = [];
      this.updateTagFilterButtonText();
      this.currentWords = this.applyAllFilters(this.words);
    }

    this.displayCurrentWord();
    this.updateButtonStates();
    this.renderDifficultyLevel();
    this.updateActiveFilterDisplay();
  };

  // 更新標籤篩選按鈕文字
  FlashcardApp.prototype.updateTagFilterButtonText = function() {
    var btn = document.getElementById('tag-filter-btn');
    if (!btn) return;

    if (this.tagFilter.length === 0) {
      btn.textContent = '🏷️ 標籤篩選';
      btn.style.color = '';
    } else {
      var displayTags = this.tagFilter.slice(0, 3).join('、');
      if (this.tagFilter.length > 3) displayTags += '…';
      btn.textContent = '🏷️ 篩選：' + displayTags;
      btn.style.color = '#87CEEB';
    }
  };

  // ===================================================================
  // 篩選指示器
  // ===================================================================

  // 更新篩選指示器
  FlashcardApp.prototype.updateActiveFilterDisplay = function() {
    var container = document.getElementById('active-filters');
    var textEl = document.getElementById('active-filters-text');
    if (!container || !textEl) return;
    
    var parts = [];
    
    if (this.difficultyFilter < 0) {
      parts.push('⭐ 非常熟');
    } else if (this.difficultyFilter > 0) {
      parts.push('⭐ ★' + this.difficultyFilter + '+');
    }
    
    if (this.reviewFilter !== 'all') {
      var reviewLabels = {
        'never': '📅 從未複習',
        '2weeks': '📅 >2週',
        '1month': '📅 >1月',
        '3months': '📅 >3月',
        '6months': '📅 >6月'
      };
      parts.push(reviewLabels[this.reviewFilter] || '');
    }
    
    if (this.mustSpellFilter) {
      parts.push('✍️ 要會拼');
    }

    if (this.typeFilter.length < 3) {
      var typeLabels = { word: '單字', phrase: '片語', sentence: '句子' };
      var typeNames = [];
      for (var ti = 0; ti < this.typeFilter.length; ti++) {
        typeNames.push(typeLabels[this.typeFilter[ti]]);
      }
      parts.push('📝 ' + typeNames.join('、'));
    }

    if (this.tagFilter.length > 0) {
      var displayTags = this.tagFilter.slice(0, 2).join('、');
      if (this.tagFilter.length > 2) displayTags += '…';
      parts.push('🏷️ ' + displayTags);
    }
    
    if (this.srsReviewActive) {
      parts.push('📖 快速複習');
    }
    
    if (parts.length > 0) {
      textEl.textContent = '篩選: ' + parts.join(' | ') + ' (' + this.currentWords.length + '個)';
      container.style.display = 'flex';
    } else {
      container.style.display = 'none';
    }
  };

  // 清除所有篩選
  FlashcardApp.prototype.clearAllFilters = function() {
    console.log('清除所有篩選條件');
    this.difficultyFilter = 0;
    this.reviewFilter = 'all';
    this.mustSpellFilter = false;
    this.typeFilter = ['word', 'phrase', 'sentence'];
    this.tagFilter = [];
    this.srsReviewActive = false;
    this.updateDifficultyFilterButtonText();
    this.updateReviewFilterButtonText();
    this.updateMustSpellFilterButtonText();
    this.updateTypeFilterButtonText();
    this.updateTagFilterButtonText();
    this.reapplyFilters();
  };


</script>
