  /**
   * 格式化日期為 YYYY-MM-DD 字串（ES5 兼容）
   * @param {Date} [date] - 要格式化的日期，預設為今天
   * @returns {string} 格式化後的日期字串
   */
  function formatDateYYYYMMDD(date) {
    var d = date || new Date();
    var year = d.getFullYear();
    var month = d.getMonth() + 1;
    var day = d.getDate();
    if (month < 10) month = '0' + month;
    if (day < 10) day = '0' + day;
    return year + '-' + month + '-' + day;
  }

  /**
   * 判斷 modal 背景點擊是否應關閉 modal。
   * 當使用者直接點擊 modal 背景（而非其內部元素）時回傳 true。
   * @param {Event} e - 點擊事件
   * @param {HTMLElement} modal - modal 元素
   * @returns {boolean} 是否應該關閉 modal
   */
  function isModalBackgroundClick(e, modal) {
    return e.target === modal;
  }

  /**
   * 從語音列表中選擇語音（依 voiceURI 或語系前綴）
   * @param {Array} voices - 可用語音列表
   * @param {string} voiceURI - 偏好的語音 URI
   * @param {string} langPrefix - 語系前綴（如 'en-', 'ja-', 'zh-'）
   * @returns {Object|null} 找到的語音物件
   */
  function selectVoiceByURIOrLang(voices, voiceURI, langPrefix) {
    var found = null;
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].voiceURI === voiceURI) return voices[i];
      if (!found && voices[i].lang.indexOf(langPrefix) === 0) found = voices[i];
    }
    return found;
  }

  /**
   * 判斷單字類型：sentence（句號/問號/驚嘆號結尾，含引號包裹）、phrase（含空格）、word（其他）
   * @param {string} english - 英文字串
   * @returns {string} 'sentence' | 'phrase' | 'word'
   */
  function getWordType(english) {
    var trimmed = (english || '').trim();
    var last = trimmed.charAt(trimmed.length - 1);
    if (last === '"' || last === '\u201D' || last === "'") {
      last = trimmed.charAt(trimmed.length - 2);
    }
    if (last === '.' || last === '?' || last === '!') return 'sentence';
    if (trimmed.indexOf(' ') !== -1) return 'phrase';
    return 'word';
  }

  /**
   * 套用不熟程度 CSS class 到元素（清除舊 class 後加入新 class）
   * @param {HTMLElement} element - 目標元素
   * @param {number} level - 不熟程度等級 (-999 到 10)
   */
  function applyDifficultyClass(element, level) {
    if (!element) return;
    element.className = element.className.replace(/\bdifficulty-level-n1\b/g, '');
    for (var i = 0; i <= 10; i++) {
      element.className = element.className.replace(new RegExp('\\bdifficulty-level-' + i + '\\b', 'g'), '');
    }
    var newCls = level < 0 ? 'difficulty-level-n1' : 'difficulty-level-' + level;
    element.className = (element.className + ' ' + newCls).replace(/\s+/g, ' ').trim();
  }

  /**
   * 通用 Modal 開啟（暫停計時器 + 顯示）
   * @param {string} modalId - modal 元素的 ID
   * @returns {HTMLElement|null} modal 元素
   */
  function openModalById(app, modalId) {
    var modal = document.getElementById(modalId);
    if (!modal) return null;
    modal.style.display = 'flex';
    if (app && typeof app.pauseTimer === 'function') app.pauseTimer();
    return modal;
  }

  /**
   * 通用 Modal 關閉（隱藏 + 恢復計時器）
   * @param {string} modalId - modal 元素的 ID
   */
  function closeModalById(app, modalId) {
    var modal = document.getElementById(modalId);
    if (!modal) return;
    // 只有在 modal 確實是開啟狀態（由 openModalById 設為 flex）時才關閉並恢復計時器
    var wasOpen = modal.style.display === 'flex';
    modal.style.display = 'none';
    if (wasOpen && app && typeof app.resumeTimer === 'function') app.resumeTimer();
  }

  /**
   * 單字卡應用程式建構函式
   * 負責初始化各模組狀態（核心、語音、設定、篩選、螢幕常亮、測驗），
   * 並自動呼叫 init() 啟動初始化流程。
   * @constructor
   */
  function FlashcardApp() {
    this._initCoreState();
    this._initVoiceState();
    this._initSettingsState();
    this._initFilterState();
    this._initScreenAwakeState();
    this._initQuizState();
    
    // 啟動初始化
    this.init();
  }

  /**
   * 從候選單字中產生指定數量的錯誤選項（測驗 / 聽力練習共用）。
   * @param {string} correctAnswer - 正確答案（要排除）
   * @param {Array} allWords - 所有可用單字
   * @param {string} field - 要取的欄位名稱（'chinese' 或 'english'）
   * @param {number} count - 需要的錯誤選項數量
   * @param {Array} [genericFallback] - 隨機選項不足時的通用備選
   * @returns {Array<string>} 錯誤選項陣列
   */
  FlashcardApp.prototype._generateWrongOptions = function(correctAnswer, allWords, field, count, genericFallback) {
    var wrongOptions = [];
    var attempts = 0;
    var maxAttempts = APP_CONSTANTS.QUIZ_MAX_WRONG_OPTION_ATTEMPTS;

    while (wrongOptions.length < count && attempts < maxAttempts) {
      attempts++;
      var randomWord = allWords[Math.floor(Math.random() * allWords.length)];
      var candidate = randomWord[field];
      if (candidate !== correctAnswer && wrongOptions.indexOf(candidate) === -1) {
        wrongOptions.push(candidate);
      }
    }

    if (genericFallback) {
      for (var i = 0; i < genericFallback.length && wrongOptions.length < count; i++) {
        if (genericFallback[i] !== correctAnswer && wrongOptions.indexOf(genericFallback[i]) === -1) {
          wrongOptions.push(genericFallback[i]);
        }
      }
    }

    return wrongOptions;
  };

  /**
   * 初始化方法：載入設定、連接 Google Sheet、設置 UI、開始載入單字。
   * 依序：loadSettings → loadSheetSettings → loadSrsData → setupUI → loadWords
   */
  FlashcardApp.prototype.init = function() {
    console.log('=== FlashcardApp 初始化開始 (ES5版本) ===');
    try {
      console.log('載入基本設定...');
      this.loadSettings();
      this.loadSheetSettings();
      this.loadSrsData();
      
      console.log('Sheet 設定:', this.sheetSettings);
      
      // 檢測瀏覽器是否需要語音交互
      this.detectLegacyBrowser();
      
      console.log('設定事件監聽器...');
      this.setupEventListeners();
      
      // 檢查是否有已設定的 Google Sheet
      if (this.sheetSettings.sheetId && this.sheetSettings.selectedSheets.length > 0) {
        console.log('發現已設定的 Google Sheet，載入單字...');
        var self = this;
        this.loadWords(true, function(hasDuplicates) {
          self.handleLoadingComplete(hasDuplicates);
        });
        } else {
        console.log('沒有找到 Google Sheet 設定，顯示設定畫面');
        this.handleLoadingComplete(false, true);
        return;
      }
      
      console.log('=== FlashcardApp 初始化完成 ===');
    } catch (error) {
      console.error('初始化錯誤:', error);
      this.showError();
    }
    
    // 初始化按鈕狀態
    this.updateVoiceButtonState();
    this.updatePauseButtonState();
    
    // 啟用防止螢幕關閉功能
    this.enableKeepScreenAwake();
  };
  
  // 檢測舊版瀏覽器
  FlashcardApp.prototype.detectLegacyBrowser = function() {
    var userAgent = navigator.userAgent;
    var isIOS = /iPad|iPhone|iPod/.test(userAgent);
    var iosVersion = null;
    var isOldChrome = false;
    
    if (isIOS) {
      var match = userAgent.match(/OS (\d+)_/);
      if (match) {
        iosVersion = parseInt(match[1]);
      }
    }
    
    // 檢測舊版Chrome（版本低於80）
    var chromeMatch = userAgent.match(/Chrome\/(\d+)/);
    if (chromeMatch) {
      var chromeVersion = parseInt(chromeMatch[1]);
      isOldChrome = chromeVersion < 80;
    }
    
    // 檢測需要用戶交互才能播放語音的瀏覽器：
    // 1. iPad/iOS 10及以下版本
    // 2. 舊版Chrome（版本低於80）
    // 3. Safari 12及以下版本
    this.isLegacyBrowser = (isIOS && iosVersion && iosVersion <= 10) || 
                          isOldChrome ||
                          userAgent.indexOf('Safari') !== -1 && userAgent.indexOf('Chrome') === -1 && 
                          userAgent.match(/Version\/(\d+)/) && parseInt(userAgent.match(/Version\/(\d+)/)[1]) <= 12;
    
    // 新版瀏覽器自動啟用語音
    if (!this.isLegacyBrowser) {
      this.speechActivated = true;
    }
    
    console.log('瀏覽器檢測結果:', {
      userAgent: userAgent,
      isIOS: isIOS,
      iosVersion: iosVersion,
      isOldChrome: isOldChrome,
      isLegacyBrowser: this.isLegacyBrowser,
      speechActivated: this.speechActivated
    });
  };
  
  // 處理載入完成
  FlashcardApp.prototype.handleLoadingComplete = function(hasDuplicates, shouldOpenSettings) {
    if (this.isLegacyBrowser && !this.speechActivated) {
      // 舊版瀏覽器顯示語音啟用按鈕
      this.showSpeechActivation();
    } else {
      // 新版瀏覽器或已啟用語音，直接進入主畫面
      this.hideLoading();
      this.applySettings();
      
      if (shouldOpenSettings) {
        this.openSheetSettings();
      } else if (!hasDuplicates) {
        this.startNewRound();
      }
      
    }
  };
  
  /**
   * 從 localStorage 載入使用者設定（顯示模式、延遲時間、語音等）。
   * 支援舊版 reverseMode → displayMode 的向後相容遷移。
   */
  FlashcardApp.prototype.loadSettings = function() {
    try {
      var savedSettings = JSON.parse(localStorage.getItem(APP_CONSTANTS.STORAGE_KEYS.SETTINGS) || '{}');
      
      // 向後相容：將舊版 reverseMode (boolean) 遷移至新版 displayMode (string)
      if (savedSettings.hasOwnProperty('reverseMode') && !savedSettings.hasOwnProperty('displayMode')) {
        savedSettings.displayMode = savedSettings.reverseMode ? 'chinese-first' : 'english-first';
        delete savedSettings.reverseMode;
      }
      
      for (var key in savedSettings) {
        if (savedSettings.hasOwnProperty(key) && this.settings.hasOwnProperty(key)) {
          this.settings[key] = savedSettings[key];
        }
      }
      
      var savedVoiceSettings = JSON.parse(localStorage.getItem(APP_CONSTANTS.STORAGE_KEYS.VOICE_SETTINGS) || '{}');
      for (var key in savedVoiceSettings) {
        if (savedVoiceSettings.hasOwnProperty(key) && this.voiceSettings.hasOwnProperty(key)) {
          this.voiceSettings[key] = savedVoiceSettings[key];
        }
      }
    } catch (e) {
      console.log('載入設定失敗，使用預設值');
    }

  // 添加到Sheet歷史記錄
  FlashcardApp.prototype.addToSheetHistory = function(sheetId, sheetName) {
    try {
      console.log('添加到歷史記錄:', sheetId, sheetName);
      
      // 檢查是否為預設檔案，如果是則不添加
      if (this.isDefaultSheet(sheetId)) {
        console.log('這是預設檔案，不添加到歷史記錄');
        return;
      }
      
      var history = this.loadSheetHistory();
      
      // 檢查是否已存在
      var existingIndex = -1;
      for (var i = 0; i < history.length; i++) {
        if (history[i].id === sheetId) {
          existingIndex = i;
          break;
        }
      }
      
      if (existingIndex !== -1) {
        // 如果已存在，更新名稱並移到最前面
        history[existingIndex].name = sheetName;
        history[existingIndex].lastUsed = new Date().toISOString();
        var item = history.splice(existingIndex, 1)[0];
        history.unshift(item);
      } else {
        // 新項目，添加到最前面
        history.unshift({
          id: sheetId,
          name: sheetName,
          isDefault: false,
          lastUsed: new Date().toISOString()
        });
      }
      
      // 限制歷史記錄數量
      if (history.length > APP_CONSTANTS.HISTORY_MAX_ITEMS) {
        history = history.slice(0, APP_CONSTANTS.HISTORY_MAX_ITEMS);
      }
      
      this.saveSheetHistory(history);
      console.log('歷史記錄已更新，總數:', history.length);
    } catch (e) {
      console.error('添加到歷史記錄失敗:', e);
    }
  };

    console.log('為select元素添加保護:', selectElement.id || selectElement.className);
    
    // 阻止所有可能導致問題的事件冒泡

          e.stopPropagation();
          
          // 對於focus事件，確保select獲得焦點
          if (eventName === 'focus') {
            console.log('Select獲得焦點');

          else if (eventName === 'blur') {
            console.log('Select失去焦點');
          }

      })(eventType);
    }
    
    // 特別處理鍵盤事件
    selectElement.addEventListener('keydown', function(e) {
      console.log('Select keydown 事件:', e.keyCode);

  // 客戶端 ES5 相容的重複單字偵測與自動處理
  FlashcardApp.prototype.detectAndHandleDuplicatesInMemory = function(allWords) {
    var duplicatesMap = {};
    var i, j, key, word;
    
    // 建立小寫英文 → 單字陣列的對應表
    for (i = 0; i < allWords.length; i++) {
      word = allWords[i];
      key = word.english.toLowerCase().trim();
      if (!duplicatesMap[key]) {
        duplicatesMap[key] = [];
      }
      duplicatesMap[key].push(word);
    }
    
    // 找出重複的單字
    var duplicates = [];
    for (key in duplicatesMap) {
      if (duplicatesMap.hasOwnProperty(key) && duplicatesMap[key].length > 1) {
        var wordsList = duplicatesMap[key];
        var firstDef = wordsList[0].chinese.toLowerCase().trim();
        var isSameDefinition = true;
        for (j = 1; j < wordsList.length; j++) {
          if (wordsList[j].chinese.toLowerCase().trim() !== firstDef) {
            isSameDefinition = false;
            break;
          }
        }
        duplicates.push({
          english: wordsList[0].english,
          words: wordsList,
          isSameDefinition: isSameDefinition
        });
      }
    }
    
    if (duplicates.length === 0) {
      return { words: allWords, autoHandled: false, autoResults: null };
    }
    
    // 在記憶體中自動處理重複
    var wordsToRemoveIds = {};
    var wordsToModify = {};
    var successCount = 0;
    
    for (i = 0; i < duplicates.length; i++) {
      var dup = duplicates[i];
      if (dup.isSameDefinition) {
        // 中文相同：保留第一個，移除其餘
        for (j = 1; j < dup.words.length; j++) {
          wordsToRemoveIds[dup.words[j].id] = true;
        }
        successCount++;
      } else {
        // 中文不同：合併定義到第一個
        var allDefs = [];
        for (j = 0; j < dup.words.length; j++) {
          allDefs.push((j + 1) + '. ' + dup.words[j].chinese.trim());
        }
        var mergedDef = allDefs.join('\n');
        wordsToModify[dup.words[0].id] = mergedDef;
        for (j = 1; j < dup.words.length; j++) {
          wordsToRemoveIds[dup.words[j].id] = true;
        }
        successCount++;
      }
    }
    
    // 建立處理後的單字陣列
    var processedWords = [];
    for (i = 0; i < allWords.length; i++) {
      word = allWords[i];
      if (wordsToRemoveIds[word.id]) continue;
      if (wordsToModify.hasOwnProperty(String(word.id))) {
        // 複製並修改
        var modifiedWord = {};
        for (var prop in word) {
          if (word.hasOwnProperty(prop)) {
            modifiedWord[prop] = word[prop];
          }
        }
        modifiedWord.chinese = wordsToModify[word.id];
        processedWords.push(modifiedWord);
      } else {
        processedWords.push(word);
      }
    }
    
    var removedCount = allWords.length - processedWords.length;
    console.log('客戶端重複偵測完成：發現', duplicates.length, '組重複，移除', removedCount, '個');
    
    return {
      words: processedWords,
      autoHandled: true,
      autoResults: {
        success: true,
        successCount: successCount,
        totalCount: duplicates.length,
        originalCount: allWords.length,
        processedCount: processedWords.length,
        removedCount: removedCount
      }
    };
  };
  
  // 逐表載入單字（含真實進度條）
  FlashcardApp.prototype.loadWordsProgressively = function(callback) {
    var self = this;
    var selectedSheets = this.sheetSettings.selectedSheets;
    var sheetId = this.sheetSettings.sheetId;
    var allWords = [];
    var completed = 0;
    var total = selectedSheets.length;
    
    // 顯示初始進度
    this.updateLoadingProgress(0, total, '正在連接 Google Sheet...');
    
    // 整體超時
    var loadTimeout = setTimeout(function() {
      console.error('載入單字超時 (' + APP_CONSTANTS.LOAD_TIMEOUT_MS + 'ms)');
      if (allWords.length > 0) {
        self.finishProgressiveLoading(allWords, callback);
      } else {
        self.handleLoadingComplete(false, true);
      }
    }, APP_CONSTANTS.LOAD_TIMEOUT_MS);
    
    // 並行載入各工作表
    for (var i = 0; i < selectedSheets.length; i++) {
      (function(sheetName, index) {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.success && result.words) {
              for (var j = 0; j < result.words.length; j++) {
                allWords.push(result.words[j]);
              }
              console.log('工作表', sheetName, '載入成功，', result.words.length, '個單字');
            } else {
              console.warn('工作表', sheetName, '載入結果異常:', result);
            }
            
            completed++;
            self.updateLoadingProgress(completed, total,
              '載入工作表 ' + completed + '/' + total + '...');
            
            if (completed >= total) {
              clearTimeout(loadTimeout);
              self.finishProgressiveLoading(allWords, callback);
            }
          })
          .withFailureHandler(function(error) {
            console.error('載入工作表失敗:', sheetName, error);
            completed++;
            
            self.updateLoadingProgress(completed, total,
              '載入工作表 ' + completed + '/' + total + '...');
            
            if (completed >= total) {
              clearTimeout(loadTimeout);
              if (allWords.length > 0) {
                self.finishProgressiveLoading(allWords, callback);
              } else {
                self.handleLoadingComplete(false, true);
              }
            }
          })
          .getWordsFromSingleSheet(sheetId, sheetName);
      })(selectedSheets[i], i);
    }
  };
  
  // 完成逐表載入後的處理
  FlashcardApp.prototype.finishProgressiveLoading = function(allWords, callback) {
    // 重新分配唯一 ID
    for (var i = 0; i < allWords.length; i++) {
      allWords[i].id = i;
    }
    
    if (allWords.length === 0) {
      this.handleLoadingComplete(false, true);
      return;
    }
    
    this.updateLoadingProgress(1, 1, '處理資料中...');
    
    // 客戶端偵測並自動處理重複單字
    var result = this.detectAndHandleDuplicatesInMemory(allWords);
    this.words = result.words;
    
    if (result.autoHandled && result.autoResults && result.autoResults.successCount > 0) {
      this.showAutoProcessingNotification(result.autoResults);
    }
    
    this.updateLoadingProgress(1, 1, '載入完成！');
    callback(false);
  };
  
  // 載入單字
  FlashcardApp.prototype.loadWords = function(isInitialLoad, callback) {
    var self = this;
    callback = callback || function() {};
    
    // 清理先前預加載的圖片缓存
    this.preloadedImages = {};
    this.currentPreloadingImage = null;
    
    if (this.sheetSettings.sheetId && this.sheetSettings.selectedSheets.length > 0) {
      if (isInitialLoad) {
        // 初始載入：逐表載入，顯示真實進度
        this.loadWordsProgressively(callback);
        return;
      }
      
      // 非初始載入（從設定重新載入）：使用單次呼叫
      google.script.run
        .withSuccessHandler(function(result) {
          console.log('載入結果:', result);
          
          if (result && result.words && result.words.length > 0) {
            self.words = result.words;
            
            if (result.autoHandled) {
              console.log('重複單字已自動處理:', result.autoResults);
              if (result.autoResults && result.autoResults.successCount > 0) {
                self.showAutoProcessingNotification(result.autoResults);
              }
              callback(false);
            } else if (result.hasDuplicates && result.duplicates.length > 0) {
              console.log('發現重複單字需要手動處理:', result.duplicates);
              self.duplicateWords = result.duplicates;
              self.currentDuplicateIndex = 0;
              self.duplicateProcessingResults = [];
              
              if (document.readyState === 'complete') {
                self.showDuplicateModal();
              } else {
                window.addEventListener('load', function() {
                  self.showDuplicateModal();
                });
              }
              callback(true);
              return;
            } else {
              callback(false);
            }
          } else {
            throw new Error('沒有找到單字資料');
          }
        })
        .withFailureHandler(function(error) {
          console.error('載入單字失敗:', error);
          self.handleLoadingComplete(false, true);
        })
        .getWordsFromSheetsWithDuplicateDetection(self.sheetSettings.sheetId, self.sheetSettings.selectedSheets, false);
    } else {
      google.script.run
        .withSuccessHandler(function(words) {
          if (words && words.length > 0) {
            self.words = words;
            callback(false);
          } else {
            throw new Error('沒有找到單字資料');
          }
        })
        .withFailureHandler(function(error) {
          console.error('載入單字失敗:', error);
          self.handleLoadingComplete(false, true);
        })
        .getWordsFromSheet();
    }
  };
  
</script>
