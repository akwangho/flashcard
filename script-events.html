<!-- script-events.html -->
<script>
  /**
   * @module script-events
   * @description 事件綁定與 UI 互動模組：所有事件監聽器的設置（核心點擊、選單委派、
   *   模態框、鍵盤快捷鍵、進度區、匯出）、舊版瀏覽器語音啟用、
   *   顯示單字、更新進度、開始新回合、自訂確認對話框。
   *
   * @dependencies script-core.html (FlashcardApp, APP_CONSTANTS)
   * @provides FlashcardApp.prototype: setupEventListeners, handleKeyDown,
   *   setupModalListeners, displayCurrentWord, startNewRound, shuffleArray,
   *   toggleMenu, closeMenu, hideLoading, showError, customConfirm ...
   */

  /**
   * 設置所有事件監聽器（鍵盤、觸控、按鈕、Modal、滑動手勢等）。
   * 呼叫一次後設定 listenersSetup 旗標，防止重複綁定。
   */
  FlashcardApp.prototype.setupEventListeners = function() {
    console.log('設置事件監聽器...');
  
    if (this.listenersSetup) {
      console.log('事件監聽器已設置，跳過重複設置');
        return;
      }
      
    this.setupCoreListeners();
    this.setupMenuListeners();
    this.setupModalListeners();
    this.setupKeyboardListeners();
    this.setupSwipeListeners();
    this.setupProgressAndExportListeners();
  
    this.listenersSetup = true;
    console.log('所有事件監聽器設置完成');
  };
  
  // 核心監聽器
  FlashcardApp.prototype.setupCoreListeners = function() {
    var self = this;
    
    var flashcardDiv = document.getElementById('flashcard');
    var nextBtn = document.getElementById('next-btn');
    var prevBtn = document.getElementById('prev-btn');
    
    // 在整個flashcard區域添加點擊事件，但排除下方區域
    if (flashcardDiv) {
      flashcardDiv.addEventListener('click', function(e) { 
        self.handleFlashcardClick(e); 
      });
    }
    if (nextBtn) {
      nextBtn.addEventListener('click', function() { self.nextWord(); });
    }
    if (prevBtn) {
      prevBtn.addEventListener('click', function() { self.previousWord(); });
    }
    // 移除 restartBtn 的直接事件綁定，因為它已經在選單委派事件中處理了
    
    // 新增按鈕事件監聽器
    var voiceToggleBtn = document.getElementById('voice-toggle-btn');
    var pauseBtn = document.getElementById('pause-btn');
    var restoreBtn = document.getElementById('restore-btn');
    
    if (voiceToggleBtn) {
      voiceToggleBtn.addEventListener('click', function() { self.toggleVoice(); });
    }
    if (pauseBtn) {
      pauseBtn.addEventListener('click', function() { self.togglePause(); });
    }
    if (restoreBtn) {
      restoreBtn.addEventListener('click', function() { self.cancelRemoval(); });
    }
    
    // 為暫停指示器添加點擊事件，讓用戶可以點擊"已暫停"來結束暫停
    var pausedIndicator = document.getElementById('paused-indicator');
    if (pausedIndicator) {
      pausedIndicator.addEventListener('click', function(e) { 
        // 阻止事件冒泡，避免觸發 flashcard 的點擊事件
        if (e.stopPropagation) {
          e.stopPropagation();
        } else {
          e.cancelBubble = true; // IE8 及更早版本
        }
        
        if (self.userPaused) {
          self.togglePause(); 
        }
      });
    }
    
    // 為靜音指示器添加點擊事件，讓用戶可以點擊"已靜音"來切換靜音狀態
    var mutedIndicator = document.getElementById('muted-indicator');
    if (mutedIndicator) {
      mutedIndicator.addEventListener('click', function(e) { 
        // 阻止事件冒泡，避免觸發 flashcard 的點擊事件
        if (e.stopPropagation) {
          e.stopPropagation();
        } else {
          e.cancelBubble = true; // IE8 及更早版本
        }
        
        self.toggleVoice(); 
      });
    }
    

  };
  
  // 選單監聽器
  FlashcardApp.prototype.setupMenuListeners = function() {
    console.log('設定選單事件監聽器...');
    
    var self = this;
    var menuBtn = document.getElementById('menu-btn');
    var menuDropdown = document.getElementById('menu-dropdown');
    
    if (!menuBtn || !menuDropdown) {
      console.error('找不到選單元素');
      return;
    }
    
    // 工具列隱藏後，透過滑鼠離開或觸控重新顯示
    var controlsWrapper = document.querySelector('.controls-wrapper');
    if (controlsWrapper) {
      controlsWrapper.addEventListener('mouseleave', function() {
        controlsWrapper.classList.remove('force-hide');
      });
      controlsWrapper.addEventListener('touchstart', function() {
        controlsWrapper.classList.remove('force-hide');
      });
    }
    
        // 使用委派事件監聽
    document.addEventListener('click', function(e) {
      // 檢查是否點擊了select相關元素，如果是則不處理任何選單邏輯
      var target = e.target;
      var isSelectRelated = false;
      
      // 向上遍歷DOM樹檢查是否點擊了select或其相關元素
      var element = target;
      while (element && element !== document.body) {
        if (element.tagName === 'SELECT' || 
            element.tagName === 'OPTION' ||
            (element.classList && (
              element.classList.contains('modal') ||
              element.classList.contains('modal-content') ||
              element.classList.contains('setting-control') ||
              element.classList.contains('font-preview')))) {
          isSelectRelated = true;
          break;
        }
        element = element.parentElement;
      }
      
      // 如果點擊的是select相關元素，直接返回，不處理選單邏輯
      if (isSelectRelated) {
        console.log('點擊了select相關元素，跳過選單處理');
        return;
      }
      
      // 處理選單按鈕點擊
      if (e.target.id === 'menu-btn' || e.target.closest('#menu-btn')) {
        console.log('選單按鈕被點擊');
        e.stopPropagation();
        self.toggleMenu();
        return;
      }
      
      // 處理選單項目點擊
      if (e.target.closest('#menu-dropdown')) {
        console.log('點擊選單下拉選項');
        e.stopPropagation();

        // 處理飛出式子選單觸發（觸控裝置用）
        var flyoutTrigger = e.target.closest('.menu-flyout-trigger');
        if (flyoutTrigger) {
          var flyout = flyoutTrigger.parentElement;
          if (flyout && flyout.classList.contains('menu-flyout')) {
            self.toggleFlyout(flyout);
          }
          return;
        }

        // 資料驅動的選單動作對照表（新增/移除選單項目只需編輯此表）
        var menuActions = {
          'restart-btn':          function() { self.confirmRestart(); },
          'fullscreen-btn':       function() { self.toggleFullscreen(); },
          'sheet-settings-btn':   function() { self.openSheetSettings(); },
          'voice-settings-btn':   function() { self.openVoiceSettings(); },
          'settings-btn':         function() { self.openSettings(); },
          'quick-mode-1-btn':     function() { self.applyQuickMode(1); },
          'quick-mode-2-btn':     function() { self.applyQuickMode(2); },
          'quick-mode-3-btn':     function() { self.applyQuickMode(3); },
          'quick-mode-4-btn':     function() { self.applyQuickMode(4); },
          'quick-mode-5-btn':     function() { self.applyQuickMode(5); },
          'export-btn':           function() { self.openExportModal(); },
          'difficulty-filter-btn': function() { self.openDifficultyFilterModal(); },
          'review-filter-btn':    function() { self.openReviewFilterModal(); },
          'must-spell-filter-btn': function() { self.toggleMustSpellFilter(); },
          'type-filter-btn':      function() { self.openTypeFilterModal(); },
          'tag-filter-btn':       function() { self.openTagFilterModal(); },
          'edit-word-btn':        function() { self.openEditWordModal(); },
          'srs-review-btn':       function() { self.openSrsReviewModal(); },
          'quick-quiz-btn':       function() { self.startQuiz('quick'); },
          'full-quiz-btn':        function() { self.startQuiz('full'); },
          'listen-choose-btn':    function() { self.startListeningQuiz('choose'); },
          'listen-spell-btn':     function() { self.startListeningQuiz('spell'); }
        };

        // 解析點擊目標 ID（含 srs-review-btn 子元素相容）
        var targetId = e.target.id;
        if (!menuActions[targetId] && e.target.parentElement && e.target.parentElement.id === 'srs-review-btn') {
          targetId = 'srs-review-btn';
        }

        var action = menuActions[targetId];
        if (action) {
          // quick-mode 按鈕不需要先 closeMenu（applyQuickMode 內部會呼叫）
          if (targetId.indexOf('quick-mode') !== 0) {
            self.closeMenu();
          }
          action();
        }
        return;
      }

      // 點擊其他地方關閉選單（但排除select相關元素）
      self.closeMenu();
    });
  
    console.log('選單事件監聽器設定完成');
  };
  

  
  // 顯示語音啟用界面
  FlashcardApp.prototype.showSpeechActivation = function() {
    console.log('顯示語音啟用界面 (舊版瀏覽器)');
    var activationContainer = document.getElementById('speech-activation-container');
    if (activationContainer) {
      activationContainer.style.display = 'block';
    }
    
    // 設置語音啟用按鈕事件
    var activateBtn = document.getElementById('activate-speech-btn');
    var self = this;
    if (activateBtn) {
      activateBtn.addEventListener('click', function() {
        self.activateSpeech();
      });
    }
  };
  
  // 啟用語音功能
  FlashcardApp.prototype.activateSpeech = function() {
    console.log('用戶點擊啟用語音按鈕');
    
    // 測試語音功能是否可用
    try {
      var testUtterance = new SpeechSynthesisUtterance('');
      testUtterance.volume = 0; // 靜音測試
      this.speechSynthesis.speak(testUtterance);
      
      this.speechActivated = true;
      console.log('語音功能已啟用');
      
      // 隱藏語音啟用界面
      var activationContainer = document.getElementById('speech-activation-container');
      if (activationContainer) {
        activationContainer.style.display = 'none';
      }
      
      // 進入主畫面
      this.hideLoading();
      this.applySettings();
      
      if (this.sheetSettings.sheetId && this.sheetSettings.selectedSheets.length > 0) {
        this.startNewRound();
      } else {
        this.openSheetSettings();
      }
      
    } catch (error) {
      console.error('語音啟用失敗:', error);
      alert('語音功能啟用失敗，但程式仍可正常使用');
      this.speechActivated = false;
      
      // 仍然進入主畫面
      var activationContainer = document.getElementById('speech-activation-container');
      if (activationContainer) {
        activationContainer.style.display = 'none';
      }
      this.hideLoading();
      this.applySettings();
      
      if (this.sheetSettings.sheetId && this.sheetSettings.selectedSheets.length > 0) {
        this.startNewRound();
      } else {
        this.openSheetSettings();
      }
    }
  };
  
  // 隱藏載入畫面
  FlashcardApp.prototype.hideLoading = function() {
    var loadingDiv = document.getElementById('loading');
    var flashcardDiv = document.getElementById('flashcard');
    if (loadingDiv) loadingDiv.style.display = 'none';
    if (flashcardDiv) flashcardDiv.style.display = 'flex';
    
    // 更新按鈕狀態
    this.updateVoiceButtonState();
    this.updatePauseButtonState();
    this.updateFullscreenButtonText();
  };
  
  // 顯示錯誤
  FlashcardApp.prototype.showError = function() {
    var loadingDiv = document.getElementById('loading');
    var errorDiv = document.getElementById('error');
    if (loadingDiv) loadingDiv.style.display = 'none';
    if (errorDiv) errorDiv.style.display = 'block';
  };
  
  // 開始新回合
  FlashcardApp.prototype.startNewRound = function() {
    // _srsRestorePending 是由 loadFilterSettings() 設置的一次性旗標
    var restoreSrs = this._srsRestorePending && this._srsSelectedCount > 0;
    this._srsRestorePending = false;
    this.srsReviewActive = false;

    this.navigationHistory = [];
    this.pendingRemoval = null;
    this.userPaused = false;
    this.isPaused = false;
    this.hideRestoreButton();

    if (restoreSrs) {
      // 從 localStorage 恢復快速複習模式
      var filteredWords = this.applyAllFilters(this.words);
      var recommendedWords = this.getRecommendedWords(filteredWords);

      if (recommendedWords.length > 0) {
        var reviewCount = Math.min(this._srsSelectedCount, recommendedWords.length);
        this.currentWords = recommendedWords.slice(0, reviewCount);
        this.shuffleArray(this.currentWords);
        this.currentIndex = 0;
        this.removedWords = [];
        this.srsReviewActive = true;
        console.log('已從 localStorage 恢復快速複習模式，共', reviewCount, '個單字');
      } else {
        restoreSrs = false;
        this.saveFilterSettings();
      }
    }

    if (!restoreSrs) {
      this.srsReviewActive = false;
      this.saveFilterSettings();
      this.shuffleArray(this.words);
      this.currentWords = this.applyAllFilters(this.words);
      this.currentIndex = 0;
      this.removedWords = [];

      if (this.currentWords.length === 0) {
        var hasAnyFilter = this.difficultyFilter !== 0 ||
                           this.reviewFilter !== 'all' ||
                           this.mustSpellFilter ||
                           this.typeFilter.length < 3 ||
                           this.tagFilter.length > 0;

        if (hasAnyFilter) {
          alert('沒有符合目前篩選條件的單字！所有篩選已重設。');
          this.difficultyFilter = 0;
          this.reviewFilter = 'all';
          this.mustSpellFilter = false;
          this.typeFilter = ['word', 'phrase', 'sentence'];
          this.tagFilter = [];
          this.saveFilterSettings();
          this.currentWords = this.applyAllFilters(this.words);
        }
      }
    }

    this.updateAllFilterButtonTexts();
    this.displayCurrentWord();
    this.updateButtonStates();
    this.updateVoiceButtonState();
    this.updatePauseButtonState();
    this.updateFullscreenButtonText();
    this.renderDifficultyLevel();
    this.updateActiveFilterDisplay();
  };
  
  // 洗牌
  FlashcardApp.prototype.shuffleArray = function(array) {
    for (var i = array.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = array[i];
      array[i] = array[j];
      array[j] = temp;
    }
  };
  
  // 顯示當前單字
  /**
   * 顯示當前單字：共用前置作業 → 依模式委派至子函式。
   */
  FlashcardApp.prototype.displayCurrentWord = function() {
    if (this.currentWords.length === 0) {
      this.startNewRound();
      return;
    }
    
    var currentWord = this.currentWords[this.currentIndex];
    var englishElement = document.getElementById('english-word');
    var chineseElement = document.getElementById('chinese-word');

    // 共用前置：重置狀態
    this.showingChinese = false;
    this.isTransitioning = false;
    this.isProcessingClick = false;
    this.pendingRemoval = null;
    this.hideRestoreButton();
    this._clearDisplayTimer();
    this.resetProgressBar();

    englishElement.classList.remove('show');
    chineseElement.classList.remove('show');
    englishElement.classList.remove('word-pending-removal');
    chineseElement.classList.remove('word-pending-removal');
    englishElement.textContent = '';
    chineseElement.textContent = '';
    englishElement.style.color = '';
    chineseElement.style.color = '';
    
    // 混合模式：每張卡片隨機決定顯示順序
    if (this.settings.displayMode === 'mixed') {
      if (currentWord && currentWord.mustSpell && this.settings.mustSpellChineseFirst) {
        this.currentWordReversed = true;
      } else {
        this.currentWordReversed = Math.random() < 0.5;
      }
    }
    
    this.clearFlashcardImage();
    
    try {
      localStorage.setItem(APP_CONSTANTS.STORAGE_KEYS.LAST_WORD, JSON.stringify({
        english: currentWord.english,
        chinese: currentWord.chinese
      }));
    } catch (e) {}
    
    // 依模式委派
    var self = this;
    setTimeout(function() {
      if (self.settings.carouselMemoryMode) {
        self._displayCarouselWord(currentWord);
      } else if (self.settings.listeningMode) {
        self._displayListeningWord(currentWord);
      } else {
        self._displayNormalWord(currentWord);
      }

      self.preloadUpcomingImages(10);
    }, APP_CONSTANTS.UI_ANIMATION_DELAY_MS);
    
    this.renderDifficultyLevel();
    this.renderMustSpellIndicator();
    this.updateProgress();
    this.updateButtonStates();
  };

  /** 輪播記憶模式：同時顯示中英文，單一進度條 0%→100% */
  FlashcardApp.prototype._displayCarouselWord = function(currentWord) {
    var firstElement = document.getElementById('english-word');
    var secondElement = document.getElementById('chinese-word');
    var self = this;

    firstElement.textContent = currentWord.english;
    secondElement.textContent = currentWord.chinese;
    firstElement.classList.add('show');
    secondElement.classList.add('show');
    this.showingChinese = true;

    if (currentWord.image && currentWord.image !== '') {
      this.setFlashcardImage(currentWord.image);
    }

    setTimeout(function() { self.speakWord(currentWord.english); }, APP_CONSTANTS.SPEECH_DELAY_MS);

    var carouselDelay = this.settings.smartTimerEnabled ? this.getPhase2Delay() : this.settings.delayTime;
    var totalDelay = this.settings.delayTime + carouselDelay;
    this._setDisplayTimer(function() {
      self.waitForSpeechThenExecute(function() {
        self.nextWord();
      });
    }, totalDelay * 1000);
    this.startProgressBar('carousel', totalDelay);
  };

  /** 聽力模式：Phase 1 不顯示文字，立即發音 */
  FlashcardApp.prototype._displayListeningWord = function(currentWord) {
    var firstElement = document.getElementById('english-word');
    var self = this;

    firstElement.textContent = '';
    firstElement.classList.add('show');
    this.speakWord(currentWord.english);

    this._setDisplayTimer(function() {
      self.waitForSpeechThenExecute(function() {
        self.showSecondPartAndScheduleNext();
      });
    }, this.settings.delayTime * 1000);
    this.startProgressBar(1);
  };

  /** 一般模式（先英文/先中文/混合）：Phase 1 顯示第一語言 */
  FlashcardApp.prototype._displayNormalWord = function(currentWord) {
    var firstElement = document.getElementById('english-word');
    var self = this;

    if (this.isReversedForCurrentWord()) {
      firstElement.textContent = currentWord.chinese;
      setTimeout(function() {
        self.speakChineseWord(currentWord.chinese);
      }, APP_CONSTANTS.SPEECH_DELAY_MS);
    } else {
      firstElement.textContent = currentWord.english;
      if (!this.settings.delaySpeechInNormalMode) {
        var speechDelay = this.voiceSettings.spellOutLetters ? 50 : APP_CONSTANTS.SPEECH_DELAY_MS;
        setTimeout(function() {
          self.speakWord(currentWord.english);
        }, speechDelay);
      }
    }
    firstElement.classList.add('show');

    this._setDisplayTimer(function() {
      self.waitForSpeechThenExecute(function() {
        self.showSecondPartAndScheduleNext();
      });
    }, this.settings.delayTime * 1000);
    this.startProgressBar(1);
  };
  
  // 更新進度
  FlashcardApp.prototype.updateProgress = function() {
    var progressText = document.getElementById('progress-text');
    if (progressText) {
      var current = this.currentIndex + 1;
      var total = this.currentWords.length;
      progressText.textContent = current + '/' + total;
    }
  };
  
  // 更新按鈕狀態
  FlashcardApp.prototype.updateButtonStates = function() {
    var prevBtn = document.getElementById('prev-btn');
    if (prevBtn) {
      var isFirstWord = this.currentIndex === 0;
      var hasPendingRemoval = this.pendingRemoval !== null;
      prevBtn.disabled = (isFirstWord && !hasPendingRemoval) || this.navigationHistory.length === 0;
    }
  };
  
  // 切換選單
  FlashcardApp.prototype.toggleMenu = function() {
    console.log('toggleMenu 被調用');
    var menuBtn = document.getElementById('menu-btn');
    var menuDropdown = document.getElementById('menu-dropdown');
    
    if (!menuBtn || !menuDropdown) {
      console.error('選單元素不存在，無法切換');
        return;
      }
      
    var isOpen = menuDropdown.classList.contains('show');
    console.log('選單目前狀態:', isOpen ? '開啟' : '關閉');
    
    if (isOpen) {
      this.closeMenu();
    } else {
      console.log('開啟選單');
      // 開啟選單時移除 force-hide，確保工具列可見
      var controlsWrapper = document.querySelector('.controls-wrapper');
      if (controlsWrapper) {
        controlsWrapper.classList.remove('force-hide');
      }
      // 記住開啟選單前的暫停狀態
      this._wasPausedBeforeMenu = this.userPaused;
      if (!this.userPaused) {
        this.userPaused = true;
        this.pauseTimer();
        this.updatePauseButtonState();
      }
      // 開啟選單時同步複習日期
      this.syncReviewDates();
      menuBtn.classList.add('active');
      menuDropdown.classList.add('show');
      // 捲到選單底部，讓靠近按鈕的項目先顯示
      menuDropdown.scrollTop = menuDropdown.scrollHeight;
    }
  };
  
  // 切換飛出式子選單（觸控裝置用）
  FlashcardApp.prototype.toggleFlyout = function(flyout) {
    var isOpen = flyout.classList.contains('active');
    this.closeAllFlyouts();
    if (!isOpen) {
      flyout.classList.add('active');
    }
  };

  // 關閉所有飛出式子選單
  FlashcardApp.prototype.closeAllFlyouts = function() {
    var allFlyouts = document.querySelectorAll('.menu-flyout.active');
    for (var i = 0; i < allFlyouts.length; i++) {
      allFlyouts[i].classList.remove('active');
    }
  };

  // 關閉選單
  FlashcardApp.prototype.closeMenu = function() {
    console.log('closeMenu 被調用');
    var menuBtn = document.getElementById('menu-btn');
    var menuDropdown = document.getElementById('menu-dropdown');
    
    if (menuBtn && menuDropdown) {
      var wasOpen = menuDropdown.classList.contains('show');
      console.log('關閉選單');
      menuBtn.classList.remove('active');
      menuDropdown.classList.remove('show');
      this.closeAllFlyouts();

      // 只有選單確實是開啟狀態才恢復暫停
      if (wasOpen && !this._wasPausedBeforeMenu) {
        this.userPaused = false;
        this.updatePauseButtonState();
        this.resumeTimer();
      }
      this._wasPausedBeforeMenu = undefined;

      // 選單關閉時隱藏工具列
      if (wasOpen) {
        var controlsWrapper = document.querySelector('.controls-wrapper');
        if (controlsWrapper) {
          controlsWrapper.classList.add('force-hide');
        }
      }
    }
  };
  

  
  // 模態框監聽器
  FlashcardApp.prototype.setupModalListeners = function() {
    this._setupSettingsModalListeners();
    this._setupSheetSettingsModalListeners();
    this._setupVoiceSettingsModalListeners();
    this._setupExportModalListeners();
    this._setupOverwriteModalListeners();

    // 鍵盤監聽器 - iPad 4 兼容版本
  FlashcardApp.prototype.setupKeyboardListeners = function() {
    var self = this;
    
    // iPad 4 兼容性改進：確保 body 元素可以接收鍵盤事件
    var body = document.body;
    
    // 設置 tabindex 屬性，讓 body 可以被聚焦
    body.setAttribute('tabindex', '0');
    
    // 自動聚焦到 body 元素
    body.focus();
    
    // 加入點擊事件監聽器，確保點擊後重新聚焦到 body（但排除表單控件）
    body.addEventListener('click', function(e) {
      // 檢查點擊目標是否為表單控件
      var target = e.target;
      if (target && (
          target.tagName === 'SELECT' ||
          target.tagName === 'OPTION' ||
          target.tagName === 'INPUT' ||
          target.tagName === 'TEXTAREA' ||
          target.contentEditable === 'true'
      )) {
        console.log('點擊了表單控件，不重新聚焦到body:', target.tagName);
        return; // 不重新聚焦，讓表單控件保持焦點
      }
      
      // 檢查是否點擊了表單控件的容器
      var element = target;
      while (element && element !== body) {
        if (element.classList && (
            element.classList.contains('setting-control') ||
            element.classList.contains('font-preview')
        )) {
          console.log('點擊了表單控件容器，不重新聚焦到body');
          return;
        }
        element = element.parentElement;
      }
      
      body.focus();
    });
    
      // 鍵盤事件處理函數 - 使用 ES5 兼容語法 + key-action mapping
      //
      // keyMap: 每個條目 = { keyCodes: [...], codes: [...], keys: [...], action: fn }
      // 比對順序：keyCode → code → key（iPad 4 相容）
      var keyMap = [
        // Enter / iPad UIKeyInputUpArrow → 標記不熟
        { keyCodes: [13], codes: ['Enter'], keys: ['UIKeyInputUpArrow'],
          action: function() { self.toggleDifficultCurrentWord(); } },
        // 空格 / iPad UIKeyInputDownArrow → 點擊單字
        { keyCodes: [32], codes: ['Space'], keys: ['UIKeyInputDownArrow'],
          action: function() { self.onWordClick(); } },
        // ← / iPad UIKeyInputLeftArrow → 上一個字
        { keyCodes: [37], codes: ['ArrowLeft'], keys: ['UIKeyInputLeftArrow'],
          action: function() { self.previousWord(); } },
        // ↑ → 上一個字
        { keyCodes: [38], codes: ['ArrowUp'], keys: [],
          action: function() { self.previousWord(); } },
        // → / iPad UIKeyInputRightArrow → 下一個字
        { keyCodes: [39], codes: ['ArrowRight'], keys: ['UIKeyInputRightArrow'],
          action: function() { self.nextWord(); } },
        // ↓ → 下一個字
        { keyCodes: [40], codes: ['ArrowDown'], keys: [],
          action: function() { self.nextWord(); } },
        // Escape → 關閉所有 modal
        { keyCodes: [27], codes: ['Escape'], keys: [],
          action: function() {
            self.closeSettings();
            self.closeVoiceSettings();
            self.closeExportModal();
            self.closeOverwriteConfirmModal();
            self.closeDuplicateModal();
            self.closeDifficultyFilterModal();
            self.closeEditWordModal();
            self.closeMenu();
          } },
        // F5 / S → 增加不熟程度
        { keyCodes: [116, 83], codes: ['F5', 'KeyS'], keys: [],
          action: function() { self.increaseDifficulty(); } },
        // D → 標記非常熟（需按兩次確認）
        { keyCodes: [68], codes: ['KeyD'], keys: [],
          action: function() { self.handleMarkVeryFamiliar(); } },
        // E → 編輯當前單字（暫停時也可用）
        { keyCodes: [69], codes: ['KeyE'], keys: [],
          action: function() { self.openEditWordModal(); },
          allowWhenPaused: true }
      ];

  function handleKeyDown(e) {
    e = e || window.event;
    var keyCode = e.keyCode || e.which;
    var code = e.code || '';
    var key = e.key || '';

    // ESC 鍵關閉最上層開啟的 modal（優先於所有其他按鍵處理）
    if (keyCode === 27 || code === 'Escape' || key === 'Escape') {
      if (self._closeTopmostModal()) {
        if (e.preventDefault) { e.preventDefault(); } else { e.returnValue = false; }
        return;
      }
    }
    
    // 焦點在表單控件上時不攔截
    var activeElement = document.activeElement;
    if (activeElement && (
        activeElement.tagName === 'SELECT' ||
        activeElement.tagName === 'INPUT' ||
        activeElement.tagName === 'TEXTAREA' ||
        activeElement.contentEditable === 'true'
    )) {
      return;
    }
    
    // B 鍵 - 暫停/繼續，任何狀態下都能使用
    if (keyCode === 66 || code === 'KeyB') {
      if (e.preventDefault) { e.preventDefault(); } else { e.returnValue = false; }
      self.togglePause();
      return;
    }
    
    // 查找匹配的 action
    var matched = null;
    for (var i = 0; i < keyMap.length; i++) {
      var entry = keyMap[i];
      var hit = false;
      for (var j = 0; j < entry.keyCodes.length; j++) {
        if (keyCode === entry.keyCodes[j]) { hit = true; break; }
      }
      if (!hit) {
        for (var k = 0; k < entry.codes.length; k++) {
          if (code === entry.codes[k]) { hit = true; break; }
        }
      }
      if (!hit && entry.keys) {
        for (var m = 0; m < entry.keys.length; m++) {
          if (key === entry.keys[m]) { hit = true; break; }
        }
      }
      if (hit) { matched = entry; break; }
    }
    
    if (!matched) return;
    
    // 暫停時只允許標記為 allowWhenPaused 的按鍵
    if (self.isPaused && !matched.allowWhenPaused) return;
    
    if (e.preventDefault) { e.preventDefault(); } else { e.returnValue = false; }
    matched.action();
    }
    
    // 監聽整個 document 的鍵盤事件
    document.addEventListener('keydown', handleKeyDown);
    
    console.log('鍵盤事件監聽器已設置 (iPad 4 兼容版本)');
  };
  
  // 觸控滑動手勢監聽器（支援 smartphone, iPhone, Android, iPad）
  FlashcardApp.prototype.setupSwipeListeners = function() {
    var self = this;
    var flashcardDiv = document.getElementById('flashcard');
    if (!flashcardDiv) {
      console.log('找不到 flashcard 元素，跳過滑動手勢設置');
      return;
    }

    var touchStartX = 0;
    var touchStartY = 0;
    var touchStartTime = 0;
    var isSwiping = false;
    var SWIPE_THRESHOLD = APP_CONSTANTS.SWIPE_THRESHOLD_PX;
    var SWIPE_TIME_LIMIT = APP_CONSTANTS.SWIPE_TIME_LIMIT_MS;

    flashcardDiv.addEventListener('touchstart', function(e) {
      if (!e.touches || e.touches.length === 0) return;
      var touch = e.touches[0];
      touchStartX = touch.pageX;
      touchStartY = touch.pageY;
      touchStartTime = new Date().getTime();
      isSwiping = false;
    });

    flashcardDiv.addEventListener('touchmove', function(e) {
      // 偵測水平滑動時防止頁面捲動
      if (!e.touches || e.touches.length === 0) return;
      var touch = e.touches[0];
      var deltaX = touch.pageX - touchStartX;
      var deltaY = touch.pageY - touchStartY;

      if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
        isSwiping = true;
        if (e.preventDefault) {
          e.preventDefault();
        } else {
          e.returnValue = false;
        }
      }
    });

    flashcardDiv.addEventListener('touchend', function(e) {
      if (!e.changedTouches || e.changedTouches.length === 0) return;
      var touch = e.changedTouches[0];
      var deltaX = touch.pageX - touchStartX;
      var deltaY = touch.pageY - touchStartY;
      var deltaTime = new Date().getTime() - touchStartTime;

      // 滑動距離太短或時間太長，不視為滑動
      if (Math.abs(deltaX) < SWIPE_THRESHOLD) return;
      if (deltaTime > SWIPE_TIME_LIMIT) return;

      // 水平滑動距離必須大於垂直滑動距離（避免與上下捲動衝突）
      if (Math.abs(deltaX) < Math.abs(deltaY)) return;

      // 暫停時不處理滑動
      if (self.isPaused) return;

      // 阻止後續的 click 事件（避免滑動同時觸發點擊）
      if (e.preventDefault) {
        e.preventDefault();
      } else {
        e.returnValue = false;
      }

      // 往左滑 → 下一個字（等於按下鍵盤右鍵 →）
      if (deltaX < 0) {
        console.log('偵測到往左滑動，切換到下一個單字');
        self.nextWord();
      }
      // 往右滑 → 上一個字（等於按下鍵盤左鍵 ←）
      else {
        console.log('偵測到往右滑動，切換到上一個單字');
        self.previousWord();
      }
    });

    console.log('觸控滑動手勢監聽器已設置');
  };

  // ESC 鍵：由上而下關閉最頂層開啟的 modal，回傳是否有 modal 被關閉
  FlashcardApp.prototype._closeTopmostModal = function() {
    // custom-confirm 優先（它是最上層的覆蓋對話框）
    var confirmModal = document.getElementById('custom-confirm-modal');
    if (confirmModal && confirmModal.style.display === 'flex') {
      var cancelBtn = document.getElementById('custom-confirm-cancel');
      if (cancelBtn && cancelBtn.onclick) cancelBtn.onclick();
      return true;
    }

    // 其他 modal：按 z-index / 疊加順序，最上層優先
    var modalCloseMap = [
      { id: 'overwrite-confirm-modal', method: 'closeOverwriteConfirmModal' },
      { id: 'quiz-modal',              method: 'closeQuizModal' },
      { id: 'listening-modal',         method: 'closeListeningModal' },
      { id: 'export-modal',            method: 'closeExportModal' },
      { id: 'duplicate-words-modal',   method: 'closeDuplicateModal' },
      { id: 'edit-word-modal',         method: 'closeEditWordModal' },
      { id: 'srs-review-modal',        method: 'closeSrsReviewModal' },
      { id: 'difficulty-filter-modal',  method: 'closeDifficultyFilterModal' },
      { id: 'review-filter-modal',     method: 'closeReviewFilterModal' },
      { id: 'type-filter-modal',       method: 'closeTypeFilterModal' },
      { id: 'tag-filter-modal',        method: 'closeTagFilterModal' },
      { id: 'voice-settings-modal',    method: 'closeVoiceSettings' },
      { id: 'settings-modal',          method: 'closeSettings' },
      { id: 'sheet-settings-modal',    method: 'closeSheetSettings' }
    ];

    for (var i = 0; i < modalCloseMap.length; i++) {
      var entry = modalCloseMap[i];
      var modal = document.getElementById(entry.id);
      if (modal && modal.style.display === 'flex') {
        if (typeof this[entry.method] === 'function') {
          this[entry.method]();
        }
        return true;
      }
    }

    return false;
  };

  // 自訂確認對話框（取代瀏覽器內建 confirm，避免離開全螢幕）
  // options: { title, message, warning, confirmText, cancelText }
  // onConfirm: 確認回呼
  // onCancel: 取消回呼（可選）
  FlashcardApp.prototype.customConfirm = function(options, onConfirm, onCancel) {
    var modal = document.getElementById('custom-confirm-modal');
    var titleEl = document.getElementById('custom-confirm-title');
    var messageEl = document.getElementById('custom-confirm-message');
    var warningEl = document.getElementById('custom-confirm-warning');
    var confirmBtn = document.getElementById('custom-confirm-ok');
    var cancelBtn = document.getElementById('custom-confirm-cancel');

    if (!modal) return;

    // 設定內容
    titleEl.textContent = options.title || '確認';
    messageEl.textContent = options.message || '';
    
    if (options.warning) {
      warningEl.textContent = options.warning;
      warningEl.style.display = 'block';
    } else {
      warningEl.style.display = 'none';
    }

    confirmBtn.textContent = options.confirmText || '確定';
    cancelBtn.textContent = options.cancelText || '取消';

    // 顯示對話框
    modal.style.display = 'flex';

    // 清理函式
    var cleanup = function() {
      modal.style.display = 'none';
      confirmBtn.onclick = null;
      cancelBtn.onclick = null;
      modal.onclick = null;
    };

    // 確認按鈕
    confirmBtn.onclick = function() {
      cleanup();
      if (onConfirm) onConfirm();
    };

    // 取消按鈕
    cancelBtn.onclick = function() {
      cleanup();
      if (onCancel) onCancel();
    };

    // 點擊背景關閉（等同取消）
    modal.onclick = function(e) {
      if (e.target === modal) {
        cleanup();
        if (onCancel) onCancel();
      }
    };
  };

  

  

  

  



  // ===========================================
  // 全螢幕控制（從 script-voice.html 搬移）
  // ===========================================

  FlashcardApp.prototype._isIOSDevice = function() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent);
  };

  FlashcardApp.prototype.enterFullscreen = function() {
    console.log('嘗試進入全螢幕模式');
    
    if (this._isIOSDevice()) {
      if (window.navigator.standalone) {
        alert('目前已是全螢幕模式（從主畫面開啟）');
      } else {
        alert(
          'iPhone / iPad 的瀏覽器不支援網頁全螢幕。\n\n' +
          '如需全螢幕體驗，請在 Safari 中：\n' +
          '1. 點選底部「分享」按鈕\n' +
          '2. 選擇「加入主畫面」\n' +
          '3. 從主畫面開啟此 App'
        );
      }
      return;
    }
    
    var docElement = document.documentElement;
    
    try {
      if (docElement.requestFullscreen) {
        docElement.requestFullscreen();
      } else if (docElement.webkitRequestFullscreen) {
        docElement.webkitRequestFullscreen();
      } else if (docElement.webkitRequestFullScreen) {
        docElement.webkitRequestFullScreen();
      } else if (docElement.mozRequestFullScreen) {
        docElement.mozRequestFullScreen();
      } else if (docElement.msRequestFullscreen) {
        docElement.msRequestFullscreen();
      } else {
        console.log('此瀏覽器不支援全螢幕 API');
        alert('此瀏覽器不支援全螢幕功能');
        return;
      }
      
      console.log('全螢幕請求已發送');
      
      var self = this;
      var fullscreenChangeHandler = function() {
        var isFullscreen = document.fullscreenElement || 
                          document.webkitFullscreenElement || 
                          document.mozFullScreenElement || 
                          document.msFullscreenElement;
        
        if (isFullscreen) {
          console.log('已進入全螢幕模式');
        } else {
          console.log('已退出全螢幕模式');
        }
        
        self.updateFullscreenButtonText();
      };
      
      document.removeEventListener('fullscreenchange', fullscreenChangeHandler);
      document.removeEventListener('webkitfullscreenchange', fullscreenChangeHandler);
      document.removeEventListener('mozfullscreenchange', fullscreenChangeHandler);
      document.removeEventListener('MSFullscreenChange', fullscreenChangeHandler);
      
      document.addEventListener('fullscreenchange', fullscreenChangeHandler);
      document.addEventListener('webkitfullscreenchange', fullscreenChangeHandler);
      document.addEventListener('mozfullscreenchange', fullscreenChangeHandler);
      document.addEventListener('MSFullscreenChange', fullscreenChangeHandler);
      
    } catch (error) {
      console.error('進入全螢幕時發生錯誤:', error);
      alert('無法進入全螢幕模式，請檢查瀏覽器設定');
    }
  };

  FlashcardApp.prototype.exitFullscreen = function() {
    console.log('嘗試退出全螢幕模式');
    try {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.webkitCancelFullScreen) {
        document.webkitCancelFullScreen();
      } else if (document.mozCancelFullScreen) {
        document.mozCancelFullScreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      } else {
        console.log('此瀏覽器不支援退出全螢幕 API');
      }
      console.log('退出全螢幕請求已發送');
    } catch (error) {
      console.error('退出全螢幕時發生錯誤:', error);
    }
  };

  FlashcardApp.prototype.isFullscreen = function() {
    return !!(document.fullscreenElement || 
             document.webkitFullscreenElement || 
             document.mozFullScreenElement || 
             document.msFullscreenElement);
  };

  FlashcardApp.prototype.toggleFullscreen = function() {
    if (this.isFullscreen()) {
      this.exitFullscreen();
    } else {
      this.enterFullscreen();
    }
  };

  FlashcardApp.prototype.updateFullscreenButtonText = function() {
    var fullscreenBtn = document.getElementById('fullscreen-btn');
    if (fullscreenBtn) {
      if (this.isFullscreen()) {
        fullscreenBtn.textContent = '退出全螢幕';
      } else {
        fullscreenBtn.textContent = '全螢幕';
      }
    }
  };
  
</script>
